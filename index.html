<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSync Pro - Workspace</title>
    
    <!-- Core UI & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- React Framework -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Global Compat (เสถียรที่สุดสำหรับ GitHub Pages) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .team-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase Configuration (อัปเดตเป็นชุดใหม่แล้ว) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
            authDomain: "vitalvibe-c0306.firebaseapp.com",
            projectId: "vitalvibe-c0306",
            storageBucket: "vitalvibe-c0306.firebasestorage.app",
            messagingSenderId: "18887442289",
            appId: "1:18887442289:web:c179b03c6a818fa0ec80d0",
            measurementId: "G-S0JMBP3ERB"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- UI Icons (SVG Paths) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                dashboard: "M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 16h7v5H3v-5z",
                board: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z",
                calendar: "M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z",
                analytics: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2v-3h2v3zm4 0h-2v-5h2v5z",
                members: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
                plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
                x: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
                trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
                layers: "M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z",
                chevronLeft: "M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z",
                chevronRight: "M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z",
                right: "M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        function App() {
            // --- States & Persistence ---
            const [profile, setProfile] = useState(() => {
                const saved = localStorage.getItem('ts_v6_profile');
                return saved ? JSON.parse(saved) : { name: '', teams: [] };
            });
            const [activeTeamId, setActiveTeamId] = useState(localStorage.getItem('ts_v6_active') || null);
            const [screen, setScreen] = useState('loading'); // setup, hub, workspace
            
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            const [currentView, setCurrentView] = useState('dashboard');
            
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [viewingTask, setViewingTask] = useState(null);
            const [calendarDate, setCalendarDate] = useState(new Date());

            // --- 1. Auth Sync ---
            useEffect(() => {
                auth.signInAnonymously().catch(e => console.log("Auth error:", e));
                auth.onAuthStateChanged(u => {
                    if (!profile.name) setScreen('setup');
                    else if (!activeTeamId) setScreen('hub');
                    else setScreen('workspace');
                });
            }, [profile.name, activeTeamId]);

            // --- 2. Real-time Cloud Sync ---
            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId) return;

                const teamPath = `teams_v2/${activeTeamId}`;
                
                const unsubTasks = db.collection(`${teamPath}/tasks`).onSnapshot(snap => {
                    setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubMembers = db.collection(`${teamPath}/members`).onSnapshot(snap => {
                    setMembers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // Auto-Join Registry
                const user = auth.currentUser;
                if (user) {
                    db.collection(`${teamPath}/members`).doc(user.uid).set({
                        name: profile.name,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }

                return () => { unsubTasks(); unsubMembers(); };
            }, [activeTeamId, screen]);

            // --- 3. Handlers ---
            const handleSetupName = (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                if (name) {
                    const newProfile = { ...profile, name };
                    setProfile(newProfile);
                    localStorage.setItem('ts_v6_profile', JSON.stringify(newProfile));
                }
            };

            const handleJoinTeam = (e) => {
                e.preventDefault();
                const tid = e.target.teamId.value.trim().toUpperCase();
                if (tid) {
                    const newTeams = [...new Set([...profile.teams, tid])];
                    const updated = { ...profile, teams: newTeams };
                    setProfile(updated);
                    localStorage.setItem('ts_v6_profile', JSON.stringify(updated));
                    enterTeam(tid);
                    e.target.reset();
                }
            };

            const enterTeam = (tid) => {
                setActiveTeamId(tid);
                localStorage.setItem('ts_v6_active', tid);
                setScreen('workspace');
                setCurrentView('dashboard');
            };

            const leaveTeam = (tid) => {
                if (confirm(`ลบทีม #${tid} จากรายการของคุณ? (ข้อมูลในคลาวด์จะไม่หายไป)`)) {
                    const newTeams = profile.teams.filter(t => t !== tid);
                    const updated = { ...profile, teams: newTeams };
                    setProfile(updated);
                    localStorage.setItem('ts_v6_profile', JSON.stringify(updated));
                    if (activeTeamId === tid) setActiveTeamId(null);
                }
            };

            const handleFullReset = () => {
                if (confirm("ล้างข้อมูลผู้ใช้และเริ่มใหม่ทั้งหมด?")) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            const handleSaveTask = async (data) => {
                const path = `teams_v2/${activeTeamId}/tasks`;
                if (editingTask) {
                    await db.doc(`${path}/${editingTask.id}`).update(data);
                } else {
                    await db.collection(path).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                }
                setIsTaskModalOpen(false);
                setEditingTask(null);
            };

            const deleteTask = async (id) => {
                if (!confirm("ลบงานนี้ใช่หรือไม่?")) return;
                await db.doc(`teams_v2/${activeTeamId}/tasks/${id}`).delete();
                setViewingTask(null);
            };

            // --- 4. Logic ---
            const stats = useMemo(() => {
                const total = tasks.length;
                const done = tasks.filter(t => t.status === 'done').length;
                const inProgress = tasks.filter(t => t.status === 'in-progress').length;
                const rate = total > 0 ? Math.round((done / total) * 100) : 0;
                const workload = members.map(m => ({
                    name: m.name,
                    count: tasks.filter(t => t.assignee === m.name).length
                })).sort((a,b) => b.count - a.count);
                return { total, done, inProgress, rate, workload };
            }, [tasks, members]);

            const calendarDays = useMemo(() => {
                const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
                const first = new Date(y, m, 1).getDay();
                const count = new Date(y, m + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < first; i++) days.push(null);
                for (let i = 1; i <= count; i++) days.push(new Date(y, m, i));
                return days;
            }, [calendarDate]);

            // --- 5. Screen Views ---

            // Screen Setup: ตั้งชื่อโปรไฟล์
            if (screen === 'setup') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md animate-in text-center">
                        <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white text-4xl font-black mx-auto mb-6 shadow-xl rotate-3">T</div>
                        <h1 className="text-3xl font-black text-slate-800 mb-2">TeamSync Pro</h1>
                        <p className="text-slate-400 mb-8 uppercase tracking-widest text-[10px] font-bold">Cloud Workspace v6</p>
                        <form onSubmit={handleSetupName} className="space-y-4">
                            <input name="username" required placeholder="ระบุชื่อของคุณ" className="w-full p-5 bg-slate-50 border-none rounded-2xl text-center font-bold text-lg outline-none focus:ring-4 focus:ring-indigo-100 transition-all" />
                            <button className="w-full p-5 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg">เริ่มต้นใช้งาน</button>
                        </form>
                    </div>
                </div>
            );

            // Screen Hub: เลือกทีมงาน
            if (screen === 'hub') return (
                <div className="min-h-screen p-6 md:p-20 bg-slate-50 animate-in">
                    <div className="max-w-4xl mx-auto space-y-12">
                        <header className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <h1 className="text-4xl font-black text-slate-800">สวัสดี, {profile.name} 👋</h1>
                                <p className="text-slate-400 font-bold mt-1 tracking-wide italic">ศูนย์รวมทีมงานของคุณ</p>
                            </div>
                            <button onClick={handleFullReset} className="text-red-500 font-bold text-sm bg-red-50 px-6 py-2.5 rounded-xl hover:bg-red-100 transition-all">ออกจากระบบ / รีเซ็ต</button>
                        </header>

                        <div className="grid md:grid-cols-2 gap-10">
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 h-fit">
                                <h2 className="text-xl font-black mb-6 text-indigo-600 flex items-center gap-2"><Icon name="plus" size={24}/> สร้างหรือเข้าร่วมทีม</h2>
                                <form onSubmit={handleJoinTeam} className="space-y-4">
                                    <input name="teamId" required placeholder="ระบุ Team ID (เช่น WORK-A)" className="w-full p-5 bg-slate-50 border-none rounded-2xl font-bold outline-none focus:ring-4 focus:ring-indigo-100 uppercase" />
                                    <button className="w-full p-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">เข้าสู้ห้องทำงาน</button>
                                </form>
                                <p className="mt-6 text-[11px] text-slate-400 font-bold uppercase tracking-widest italic leading-relaxed">* แชร์ ID นี้ให้เพื่อนร่วมทีมเพื่อทำงานบนคลาวด์ร่วมกัน</p>
                            </div>

                            <div className="space-y-4">
                                <h2 className="text-xl font-black px-4 text-slate-800">ทีมของคุณ ({profile.teams.length})</h2>
                                <div className="space-y-3 overflow-y-auto max-h-[500px] no-scrollbar">
                                    {profile.teams.map(tid => (
                                        <div key={tid} onClick={() => enterTeam(tid)} className="group bg-white p-6 rounded-[2.5rem] border border-transparent hover:border-indigo-600 shadow-sm cursor-pointer flex justify-between items-center transition-all team-card">
                                            <div className="flex items-center gap-4">
                                                <div className="w-14 h-14 bg-indigo-50 text-indigo-700 rounded-2xl flex items-center justify-center font-black text-xl">#</div>
                                                <div><p className="font-black text-slate-800 text-lg leading-none">{tid}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Open Team Workspace</p></div>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); leaveTeam(tid); }} className="p-3 text-slate-100 hover:text-red-500 transition-colors"><Icon name="trash" size={20}/></button>
                                        </div>
                                    ))}
                                    {profile.teams.length === 0 && <div className="py-20 text-center border-4 border-dashed border-slate-200 rounded-[3rem] text-slate-300 font-black tracking-widest uppercase">ว่างเปล่า</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // Screen Workspace: เมนูและพื้นที่ทำงาน
            const Sidebar = () => (
                <aside className="hidden md:flex flex-col fixed inset-y-0 left-0 w-64 bg-slate-50 border-r border-slate-100 z-30">
                    <div className="p-8 flex items-center gap-3">
                        <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg">T</div>
                        <span className="text-xl font-black text-slate-800">TeamSync</span>
                    </div>
                    <nav className="flex-1 px-4 space-y-1">
                        {['dashboard', 'board', 'calendar', 'analytics', 'members'].map(id => (
                            <button key={id} onClick={() => setCurrentView(id)} className={`flex items-center gap-3 w-full p-4 rounded-2xl font-bold text-sm transition-all ${currentView === id ? 'active-tab' : 'text-slate-400 hover:text-indigo-600 hover:bg-white'}`}>
                                <Icon name={id} size={18} /> {id.charAt(0).toUpperCase() + id.slice(1)}
                            </button>
                        ))}
                    </nav>
                    <div className="p-4 m-4 bg-slate-900 rounded-[2.5rem] text-white shadow-xl">
                        <div className="flex justify-between items-center mb-3">
                            <span className="text-[9px] font-black opacity-40 uppercase">Active</span>
                            <button onClick={() => setScreen('hub')} className="text-indigo-400"><Icon name="layers" size={14}/></button>
                        </div>
                        <div className="font-black text-sm truncate mb-4 italic">#{activeTeamId}</div>
                        <button onClick={() => setScreen('hub')} className="w-full py-2 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">สลับทีมงาน</button>
                    </div>
                </aside>
            );

            const MobileNav = () => (
                <nav className="md:hidden fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-md border-t border-slate-100 flex justify-around p-3 pb-safe z-40 shadow-xl">
                    {['dashboard', 'board', 'calendar', 'members'].map(v => (
                        <button key={v} onClick={() => setCurrentView(v)} className={`p-3 rounded-2xl transition-all ${currentView === v ? 'text-indigo-600 bg-indigo-50 shadow-inner' : 'text-slate-400'}`}><Icon name={v}/></button>
                    ))}
                    <button onClick={() => setScreen('hub')} className="p-3 text-slate-400"><Icon name="layers" /></button>
                </nav>
            );

            if (screen === 'workspace') return (
                <div className="min-h-screen md:pl-64 pb-20 md:pb-0 animate-in">
                    <Sidebar />
                    <MobileNav />

                    <main className="p-6 md:p-12 max-w-6xl mx-auto space-y-10">
                        <header className="flex justify-between items-end">
                            <div>
                                <h2 className="text-4xl font-black text-slate-800 leading-tight">
                                    {currentView === 'dashboard' ? `สวัสดี, คุณ${profile.name}` : currentView}
                                </h2>
                                <p className="text-indigo-500 font-bold mt-1 uppercase tracking-widest text-[10px] flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Active: #{activeTeamId}
                                </p>
                            </div>
                            <button onClick={() => { setEditingTask(null); setIsTaskModalOpen(true); }} className="p-4 bg-indigo-600 text-white rounded-2xl shadow-xl shadow-indigo-100 hover:scale-110 active:scale-95 transition-all"><Icon name="plus" size={28}/></button>
                        </header>

                        {/* --- Dashboard --- */}
                        {currentView === 'dashboard' && (
                            <div className="space-y-10">
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                    {[
                                        { label: 'ทั้งหมด', val: tasks.length, color: 'bg-indigo-600' },
                                        { label: 'เสร็จสิ้น', val: stats.done, color: 'bg-emerald-500' },
                                        { label: 'กำลังทำ', val: tasks.filter(t=>t.status==='in-progress').length, color: 'bg-blue-500' },
                                        { label: 'สมาชิก', val: members.length, color: 'bg-slate-800' }
                                    ].map((s, i) => (
                                        <div key={i} className={`${s.color} p-6 rounded-[2rem] text-white shadow-lg flex flex-col justify-between h-32`}><p className="text-[10px] font-black opacity-60 uppercase mb-1">{s.label}</p><p className="text-4xl font-black">{s.val}</p></div>
                                    ))}
                                </div>
                                <div className="grid lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-xl mb-6">งานล่าสุดในทีม</h3>
                                        <div className="space-y-3">
                                            {tasks.slice(-5).reverse().map(t => (
                                                <div key={t.id} onClick={() => setViewingTask(t)} className="p-5 border border-slate-50 rounded-2xl hover:bg-slate-50 transition-all cursor-pointer flex justify-between items-center group">
                                                    <div><p className="font-bold text-slate-800 group-hover:text-indigo-600 leading-tight">{t.title}</p><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">{t.assignee} • {t.dueDate}</p></div>
                                                    <Icon name="right" className="text-slate-200 group-hover:text-indigo-400" size={16} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 p-10 rounded-[3rem] text-white flex flex-col justify-center relative overflow-hidden shadow-2xl">
                                        <h3 className="font-black text-xl mb-2">Team Progress</h3>
                                        <div className="flex items-end gap-5 mt-10">
                                            <div className="text-8xl font-black leading-none">{stats.rate}%</div>
                                            <div className="flex-1 pb-4"><div className="h-4 w-full bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-indigo-400" style={{ width: `${stats.rate}%` }}></div></div></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Kanban Board --- */}
                        {currentView === 'board' && (
                            <div className="flex gap-6 overflow-x-auto pb-10 no-scrollbar min-h-[600px]">
                                {['todo', 'in-progress', 'done'].map(st => (
                                    <div key={st} className="w-80 shrink-0 flex flex-col bg-slate-100/50 rounded-[2.5rem] p-4 border border-slate-100">
                                        <div className="flex items-center justify-between mb-6 px-4">
                                            <span className="font-black text-slate-400 text-[10px] uppercase tracking-widest">{st}</span>
                                            <span className="bg-white px-3 py-1 rounded-xl text-[10px] font-black shadow-sm">{tasks.filter(t => t.status === st).length}</span>
                                        </div>
                                        <div className="space-y-4 overflow-y-auto no-scrollbar pr-1">
                                            {tasks.filter(t => t.status === st).map(task => (
                                                <div key={task.id} onClick={() => setViewingTask(task)} className="bg-white p-6 rounded-[1.8rem] shadow-sm border border-white hover:border-indigo-200 transition-all cursor-pointer group">
                                                    <div className={`text-[9px] font-black px-2 py-1 rounded-lg mb-4 inline-block border ${task.priority === 'high' ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-400'}`}>{task.priority.toUpperCase()}</div>
                                                    <h4 className="font-bold text-slate-800 group-hover:text-indigo-600 leading-snug line-clamp-2">{task.title}</h4>
                                                    <div className="mt-6 flex justify-between items-center pt-4 border-t border-slate-50">
                                                        <div className="flex items-center gap-2"><div className="w-7 h-7 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600 text-[10px] font-black">{task.assignee.substring(0,2)}</div><span className="text-[10px] font-bold text-slate-400">{task.assignee}</span></div>
                                                        <span className="text-[9px] font-black text-slate-300">{task.dueDate}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- Calendar --- */}
                        {currentView === 'calendar' && (
                            <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                                <div className="flex justify-between items-center mb-10 px-4">
                                    <h3 className="text-2xl font-black text-slate-800">{calendarDate.toLocaleString('th-TH', { month: 'long', year: 'numeric' })}</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1))} className="p-3 bg-slate-50 rounded-2xl hover:bg-indigo-50 transition-all"><Icon name="chevronLeft" /></button>
                                        <button onClick={() => setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1))} className="p-3 bg-slate-50 rounded-2xl hover:bg-indigo-50 transition-all"><Icon name="chevronRight" /></button>
                                    </div>
                                </div>
                                <div className="calendar-grid gap-3">
                                    {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => (<div key={d} className="text-center font-black text-slate-300 text-[10px] py-4 uppercase tracking-widest">{d}</div>))}
                                    {calendarDays.map((date, idx) => {
                                        if (!date) return <div key={`empty-${idx}`} className="bg-slate-50/20 rounded-3xl min-h-[120px]" />;
                                        const dateStr = date.toISOString().split('T')[0];
                                        const dayTasks = tasks.filter(t => t.dueDate === dateStr);
                                        const isToday = new Date().toDateString() === date.toDateString();
                                        return (
                                            <div key={dateStr} className={`bg-slate-50 border border-slate-100 rounded-[1.8rem] p-3 min-h-[120px] transition-all hover:border-indigo-300 ${isToday ? 'ring-2 ring-indigo-500 ring-inset bg-indigo-50/20 shadow-md shadow-indigo-100' : ''}`}>
                                                <p className={`text-xs font-black mb-3 ${isToday ? 'text-indigo-600' : 'text-slate-400'}`}>{date.getDate()}</p>
                                                <div className="space-y-1.5">
                                                    {dayTasks.map(t => (<div key={t.id} onClick={() => setViewingTask(t)} className={`text-[8px] font-black p-2 rounded-xl truncate cursor-pointer shadow-sm ${t.status === 'done' ? 'bg-emerald-500 text-white' : 'bg-white text-slate-700 border border-slate-100'}`}>{t.title}</div>))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* --- Analytics --- */}
                        {currentView === 'analytics' && (
                            <div className="grid lg:grid-cols-2 gap-10">
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-sm border border-slate-100 text-center flex flex-col items-center justify-center">
                                    <h3 className="text-2xl font-black text-slate-800 mb-10">ความสำเร็จของโปรเจกต์</h3>
                                    <div className="relative w-64 h-64 flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90">
                                            <circle cx="128" cy="128" r="110" stroke="currentColor" strokeWidth="24" fill="transparent" className="text-slate-100" />
                                            <circle cx="128" cy="128" r="110" stroke="currentColor" strokeWidth="24" fill="transparent" strokeDasharray="691" strokeDashoffset={691 - (691 * stats.rate) / 100} className="text-indigo-600 transition-all duration-1000 ease-out" strokeLinecap="round" />
                                        </svg>
                                        <span className="absolute text-6xl font-black text-slate-800 tracking-tighter">{stats.rate}%</span>
                                    </div>
                                </div>
                                <div className="bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl text-white overflow-hidden">
                                    <h3 className="text-2xl font-black mb-10 tracking-tight text-indigo-400 uppercase text-xs">Workload Distribution</h3>
                                    <div className="space-y-8 overflow-y-auto max-h-[450px] pr-2 no-scrollbar">
                                        {stats.workload.map(w => (
                                            <div key={w.name}>
                                                <div className="flex justify-between items-end mb-3">
                                                    <span className="font-bold flex items-center gap-3"><div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-xs font-black shadow-lg uppercase">{w.name.substring(0,2)}</div>{w.name}</span>
                                                    <span className="text-[10px] font-black opacity-60 uppercase">{w.count} Done</span>
                                                </div>
                                                <div className="h-3 w-full bg-white/10 rounded-full overflow-hidden flex">
                                                    <div className="h-full bg-indigo-500 transition-all duration-1000" style={{ width: `${(w.count / (stats.total || 1)) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Members --- */}
                        {currentView === 'members' && (
                            <div className="space-y-10">
                                <div className="flex justify-between items-center px-4">
                                    <h3 className="text-3xl font-black text-slate-800 tracking-tight">สมาชิกในทีม ({members.length})</h3>
                                    <button onClick={async () => {
                                        const name = prompt("ระบุชื่อสมาชิกใหม่:");
                                        if(name && name.trim()) await db.collection(`teams_v2/${activeTeamId}/members`).add({ name: name.trim(), role: 'member' });
                                    }} className="p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg flex items-center gap-2 hover:scale-105 active:scale-95 transition-all"><Icon name="plus" size={20}/> เพิ่มสมาชิก</button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {members.map(m => (
                                        <div key={m.id} className="group bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm flex items-center justify-between hover:border-indigo-600 transition-all">
                                            <div className="flex items-center gap-5">
                                                <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-[1.5rem] flex items-center justify-center font-black text-2xl shadow-inner uppercase">{m.name.substring(0,2)}</div>
                                                <div>
                                                    <h4 className="font-black text-slate-800 text-lg leading-none">{m.name}</h4>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">{m.name === profile.name ? 'เจ้าของบัญชี' : 'สมาชิกทีม'}</p>
                                                </div>
                                            </div>
                                            {m.name !== profile.name && (
                                                <button onClick={async () => {
                                                    if(confirm(`ต้องการลบ ${m.name} ออกจากทีม?`)) await db.doc(`teams_v2/${activeTeamId}/members/${m.id}`).delete();
                                                }} className="p-3 text-slate-100 hover:text-red-500 transition-all bg-slate-50 rounded-xl"><Icon name="trash" size={20}/></button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-lg rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
                                <div className="p-10 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-2xl font-black text-slate-800">{editingTask ? '📝 แก้ไขงาน' : '✨ สร้างงานใหม่'}</h3>
                                    <button onClick={() => setIsTaskModalOpen(false)} className="p-3 hover:bg-white rounded-full text-slate-400 transition-all"><Icon name="x" size={20}/></button>
                                </div>
                                <form className="p-10 space-y-6" onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleSaveTask(Object.fromEntries(fd));
                                }}>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ชื่องาน</label><input required name="title" defaultValue={editingTask?.title} placeholder="ระบุสิ่งที่ต้องทำ..." className="w-full p-5 bg-slate-50 border-none rounded-[1.8rem] font-bold outline-none focus:ring-4 focus:ring-indigo-100 transition-all" /></div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">ผู้รับผิดชอบ</label><select name="assignee" defaultValue={editingTask?.assignee || profile.name} className="w-full p-4 bg-slate-50 border-none rounded-[1.2rem] font-bold outline-none">{members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">กำหนดเสร็จ</label><input name="dueDate" type="date" defaultValue={editingTask?.dueDate || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border-none rounded-[1.2rem] font-bold outline-none" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">สถานะ</label><select name="status" defaultValue={editingTask?.status || 'todo'} className="w-full p-4 bg-slate-50 border-none rounded-[1.2rem] font-bold outline-none"><option value="todo">To Do</option><option value="in-progress">Doing</option><option value="done">Done</option></select></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">ความสำคัญ</label><select name="priority" defaultValue={editingTask?.priority || 'medium'} className="w-full p-4 bg-slate-50 border-none rounded-[1.2rem] font-bold outline-none"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
                                    </div>
                                    <button className="w-full p-6 bg-indigo-600 text-white rounded-[2.2rem] font-black shadow-xl shadow-indigo-100 hover:-translate-y-1 active:scale-95 transition-all mt-4 uppercase">บันทึกข้อมูลงาน</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewingTask && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-md rounded-[4rem] shadow-2xl p-12 relative animate-in">
                                <button onClick={() => setViewingTask(null)} className="absolute top-10 right-10 p-3 hover:bg-slate-50 rounded-full text-slate-400 transition-all"><Icon name="x" size={24}/></button>
                                <div className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase mb-8 inline-block border ${viewingTask.priority === 'high' ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-400'}`}>{viewingTask.priority} PRIORITY</div>
                                <h3 className="text-4xl font-black text-slate-800 mb-10 leading-tight">{viewingTask.title}</h3>
                                <div className="space-y-5 mb-12">
                                    <div className="flex items-center gap-5 p-6 bg-slate-50 rounded-[2.5rem] shadow-inner"><div className="w-16 h-16 bg-indigo-600 rounded-[1.5rem] flex items-center justify-center text-white font-black shadow-lg text-xl uppercase">{viewingTask.assignee.substring(0,2)}</div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Assignee</p><p className="font-bold text-slate-800 text-xl">{viewingTask.assignee}</p></div></div>
                                    <div className="flex items-center gap-5 p-6 bg-slate-50 rounded-[2.5rem] shadow-inner"><div className="w-16 h-16 bg-white border border-slate-100 rounded-[1.5rem] flex items-center justify-center text-indigo-600 shadow-sm"><Icon name="calendar" size={28}/></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Due Date</p><p className="font-bold text-slate-800 text-xl">{viewingTask.dueDate}</p></div></div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => deleteTask(viewingTask.id)} className="p-6 bg-red-50 text-red-500 rounded-[2rem] hover:bg-red-100 active:scale-95 transition-all shadow-sm"><Icon name="trash" size={28}/></button>
                                    <button onClick={() => { setEditingTask(viewingTask); setViewingTask(null); setIsTaskModalOpen(true); }} className="flex-1 p-6 bg-slate-900 text-white rounded-[2.5rem] font-black shadow-2xl hover:-translate-y-1 active:scale-95 transition-all">แก้ไขภารกิจ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            return <div className="h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse uppercase tracking-[0.3em]">Connecting Cloud...</div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
