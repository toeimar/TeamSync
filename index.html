<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeamSync Pro - Cloud Management</title>
    
    <!-- Core UI & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Global Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-nav { color: #4f46e5; font-weight: 700; }
        .kanban-col { min-width: 280px; max-width: 320px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase Config (Current Project) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
            authDomain: "vitalvibe-c0306.firebaseapp.com",
            projectId: "vitalvibe-c0306",
            storageBucket: "vitalvibe-c0306.firebasestorage.app",
            messagingSenderId: "18887442289",
            appId: "1:18887442289:web:c179b03c6a818fa0ec80d0",
            measurementId: "G-S0JMBP3ERB"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Custom Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                dashboard: "M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 16h7v5H3v-5z",
                board: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z",
                calendar: "M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z",
                analytics: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2v-3h2v3zm4 0h-2v-5h2v5z",
                members: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
                plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
                layers: "M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z",
                x: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
                chevronLeft: "M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z",
                chevronRight: "M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                    <path d={paths[name]} />
                </svg>
            );
        };

        function App() {
            // --- State: Identity & Teams ---
            const [profile, setProfile] = useState(() => JSON.parse(localStorage.getItem('ts_v8_profile')) || { name: '', teams: [] });
            const [activeTeamId, setActiveTeamId] = useState(localStorage.getItem('ts_v8_active'));
            const [screen, setScreen] = useState('loading'); // setup, hub, workspace
            
            // --- Data State ---
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            const [currentView, setCurrentView] = useState('dashboard');
            
            // --- UI State ---
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [viewingTask, setViewingTask] = useState(null);
            const [calDate, setCalDate] = useState(new Date());

            // 1. Initial Load & Auth
            useEffect(() => {
                auth.signInAnonymously().catch(e => console.log(e));
                auth.onAuthStateChanged(() => {
                    if (!profile.name) setScreen('setup');
                    else if (!activeTeamId) setScreen('hub');
                    else setScreen('workspace');
                });
            }, [profile.name, activeTeamId]);

            // 2. Real-time Cloud Data Sync
            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId) return;

                const teamPath = `teams_v8/${activeTeamId}`;
                const unsubTasks = db.collection(`${teamPath}/tasks`).onSnapshot(snap => {
                    setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubMembers = db.collection(`${teamPath}/members`).onSnapshot(snap => {
                    setMembers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // Auto-register me in current team
                const u = auth.currentUser;
                if (u) {
                    db.collection(`${teamPath}/members`).doc(u.uid).set({
                        name: profile.name,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }

                return () => { unsubTasks(); unsubMembers(); };
            }, [activeTeamId, screen]);

            // 3. Handlers
            const handleSetup = (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                if (name) {
                    const p = { ...profile, name };
                    setProfile(p);
                    localStorage.setItem('ts_v8_profile', JSON.stringify(p));
                }
            };

            const handleJoinTeam = (e) => {
                e.preventDefault();
                const tid = e.target.teamId.value.trim().toUpperCase();
                if (tid) {
                    const newTeams = [...new Set([...profile.teams, tid])];
                    const p = { ...profile, teams: newTeams };
                    setProfile(p);
                    localStorage.setItem('ts_v8_profile', JSON.stringify(p));
                    setActiveTeamId(tid);
                    localStorage.setItem('ts_v8_active', tid);
                    setScreen('workspace');
                }
            };

            const switchTeam = (tid) => {
                setActiveTeamId(tid);
                localStorage.setItem('ts_v8_active', tid);
                setScreen('workspace');
                setCurrentView('dashboard');
            };

            const handleSaveTask = async (data) => {
                const path = `teams_v8/${activeTeamId}/tasks`;
                if (editingTask) await db.doc(`${path}/${editingTask.id}`).update(data);
                else await db.collection(path).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                setIsTaskModalOpen(false);
                setEditingTask(null);
            };

            // 4. Calculations
            const stats = useMemo(() => {
                const t = tasks.length;
                const d = tasks.filter(x => x.status === 'done').length;
                const p = tasks.filter(x => x.status === 'in-progress').length;
                const rate = t > 0 ? Math.round((d / t) * 100) : 0;
                
                const workload = members.map(m => ({
                    name: m.name,
                    count: tasks.filter(tk => tk.assignee === m.name).length
                })).sort((a,b) => b.count - a.count);

                return { total: t, done: d, inProgress: p, rate, workload };
            }, [tasks, members]);

            const calendarDays = useMemo(() => {
                const y = calDate.getFullYear(), m = calDate.getMonth();
                const first = new Date(y, m, 1).getDay();
                const count = new Date(y, m + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < first; i++) days.push(null);
                for (let i = 1; i <= count; i++) days.push(new Date(y, m, i));
                return days;
            }, [calDate]);

            // --- Views ---

            if (screen === 'setup') return (
                <div className="h-screen flex items-center justify-center p-6 bg-indigo-950">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm animate-in text-center">
                        <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white text-4xl font-black mx-auto mb-6 shadow-xl rotate-3 tracking-tighter">T</div>
                        <h1 className="text-2xl font-black text-slate-800">TeamSync Pro</h1>
                        <p className="text-slate-400 text-sm mt-2 mb-8">ระบุชื่อเพื่อสร้างโปรไฟล์ Cloud</p>
                        <form onSubmit={handleSetup} className="space-y-4">
                            <input name="username" required placeholder="ชื่อของคุณ" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-center font-bold text-lg focus:ring-4 focus:ring-indigo-100 transition-all outline-none" />
                            <button className="w-full p-4 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg hover:bg-indigo-700">เริ่มต้นใช้งาน</button>
                        </form>
                    </div>
                </div>
            );

            if (screen === 'hub') return (
                <div className="min-h-screen p-6 bg-slate-50 animate-in max-w-lg mx-auto">
                    <header className="flex justify-between items-center mb-10">
                        <div><h1 className="text-2xl font-black">สวัสดี, {profile.name} 👋</h1><p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Multi-Team Hub</p></div>
                        <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-red-500 text-xs font-black bg-red-50 px-4 py-2 rounded-xl">รีเซ็ตข้อมูล</button>
                    </header>

                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 mb-8">
                        <h2 className="text-lg font-black mb-6 flex items-center gap-2"><Icon name="plus" size={24} className="text-indigo-600"/> สร้างหรือเข้าร่วมทีม</h2>
                        <form onSubmit={handleJoinTeam} className="space-y-4">
                            <input name="teamId" required placeholder="รหัส Team ID (เช่น ALPHA-01)" className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none focus:ring-4 focus:ring-indigo-100 uppercase" />
                            <button className="w-full p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">เข้าสู่ห้องทำงานทีม</button>
                        </form>
                    </div>

                    <div className="space-y-4">
                        <h2 className="text-sm font-black px-4 text-slate-400 uppercase tracking-widest">รายการทีมของคุณ ({profile.teams.length})</h2>
                        {profile.teams.map(tid => (
                            <div key={tid} onClick={() => switchTeam(tid)} className="bg-white p-5 rounded-[2rem] shadow-sm flex justify-between items-center border border-transparent hover:border-indigo-200 transition-all active:scale-95 cursor-pointer">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-indigo-50 text-indigo-700 rounded-2xl flex items-center justify-center font-black text-xl">#</div>
                                    <div><p className="font-black text-lg leading-none">{tid}</p><p className="text-[10px] font-bold text-slate-400 mt-1 uppercase">Click to open</p></div>
                                </div>
                                <Icon name="chevronRight" className="text-slate-300" />
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 md:pl-64 md:pb-0">
                    {/* Desktop Sidebar */}
                    <aside className="hidden md:flex flex-col fixed inset-y-0 left-0 w-64 bg-white border-r border-slate-100 z-30 p-8">
                        <div className="flex items-center gap-3 mb-10"><div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black">T</div><span className="font-black text-xl">TeamSync</span></div>
                        <nav className="flex-1 space-y-2">
                            {['dashboard', 'board', 'calendar', 'analytics', 'members'].map(id => (
                                <button key={id} onClick={() => setCurrentView(id)} className={`flex items-center gap-4 w-full p-4 rounded-2xl text-sm font-bold transition-all ${currentView === id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name={id}/> {id.charAt(0).toUpperCase() + id.slice(1)}</button>
                            ))}
                        </nav>
                        <button onClick={() => setScreen('hub')} className="mt-auto p-4 bg-slate-900 rounded-2xl text-white text-xs font-black uppercase tracking-[0.2em] shadow-lg">สลับทีมงาน</button>
                    </aside>

                    {/* Mobile Bottom Navigation */}
                    <nav className="md:hidden fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-2 pb-safe z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                        {['dashboard', 'board', 'calendar', 'analytics', 'members'].map(v => (
                            <button key={v} onClick={() => setCurrentView(v)} className={`flex flex-col items-center p-2 flex-1 rounded-xl transition-all ${currentView === v ? 'active-nav bg-indigo-50/50' : 'text-slate-300'}`}>
                                <Icon name={v} size={22}/>
                                <span className="text-[9px] mt-1 uppercase font-black">{v === 'dashboard' ? 'Home' : v}</span>
                            </button>
                        ))}
                        <button onClick={() => setScreen('hub')} className="flex flex-col items-center p-2 flex-1 text-slate-300"><Icon name="layers" size={22}/><span className="text-[9px] mt-1 uppercase font-black">Teams</span></button>
                    </nav>

                    <main className="p-4 md:p-12 max-w-5xl mx-auto space-y-8 animate-in">
                        <header className="flex justify-between items-center">
                            <div>
                                <h2 className="text-3xl font-black tracking-tight">{currentView === 'dashboard' ? `คุณ${profile.name}` : currentView.toUpperCase()}</h2>
                                <p className="text-indigo-500 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2 mt-1">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    TEAM ID: #{activeTeamId}
                                </p>
                            </div>
                            <button onClick={() => {setEditingTask(null); setIsTaskModalOpen(true);}} className="w-12 h-12 bg-indigo-600 text-white rounded-2xl shadow-xl shadow-indigo-100 flex items-center justify-center hover:scale-110 active:scale-95 transition-all"><Icon name="plus" size={28}/></button>
                        </header>

                        {/* --- Dashboard View --- */}
                        {currentView === 'dashboard' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-indigo-600 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[10px] font-bold opacity-60 uppercase mb-1">ทั้งหมด</p><p className="text-3xl font-black">{stats.total}</p></div>
                                    <div className="bg-emerald-500 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[10px] font-bold opacity-60 uppercase mb-1">เสร็จสิ้น</p><p className="text-3xl font-black">{stats.done}</p></div>
                                    <div className="bg-blue-500 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[10px] font-bold opacity-60 uppercase mb-1">กำลังทำ</p><p className="text-3xl font-black">{stats.inProgress}</p></div>
                                    <div className="bg-slate-800 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[10px] font-bold opacity-60 uppercase mb-1">สมาชิก</p><p className="text-3xl font-black">{members.length}</p></div>
                                </div>
                                <div className="grid lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-xl mb-6">ความก้าวหน้า</h3>
                                        <div className="flex items-center gap-6">
                                            <div className="text-6xl font-black text-indigo-600">{stats.rate}%</div>
                                            <div className="h-4 flex-1 bg-slate-100 rounded-full overflow-hidden">
                                                <div className="h-full bg-indigo-500 transition-all duration-1000" style={{ width: `${stats.rate}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden relative">
                                        <h3 className="font-black text-xl mb-6">งานล่าสุด</h3>
                                        <div className="space-y-3">
                                            {tasks.slice(-4).reverse().map(t => (
                                                <div key={t.id} onClick={() => setViewingTask(t)} className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center group active:bg-indigo-50 transition-all">
                                                    <div><p className="font-bold text-sm text-slate-800 leading-none">{t.title}</p><p className="text-[10px] text-slate-400 mt-2 font-bold uppercase">{t.assignee} • {t.dueDate}</p></div>
                                                    <div className={`w-1.5 h-8 rounded-full ${t.status === 'done' ? 'bg-emerald-400' : 'bg-indigo-400'}`}></div>
                                                </div>
                                            ))}
                                            {tasks.length === 0 && <div className="py-10 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest italic">ยังไม่มีข้อมูลงาน</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Kanban Board View --- */}
                        {currentView === 'board' && (
                            <div className="flex gap-4 overflow-x-auto pb-10 no-scrollbar min-h-[500px]">
                                {['todo', 'in-progress', 'done'].map(st => (
                                    <div key={st} className="kanban-col shrink-0 flex flex-col bg-slate-100/50 rounded-[2.5rem] p-4 border border-slate-100">
                                        <div className="flex justify-between items-center mb-6 px-4">
                                            <span className="font-black text-slate-400 text-[10px] uppercase tracking-[0.2em]">{st}</span>
                                            <span className="bg-white px-3 py-1 rounded-xl text-[10px] font-black shadow-sm">{tasks.filter(t => t.status === st).length}</span>
                                        </div>
                                        <div className="space-y-4 overflow-y-auto no-scrollbar">
                                            {tasks.filter(t => t.status === st).map(task => (
                                                <div key={task.id} onClick={() => setViewingTask(task)} className="bg-white p-6 rounded-[1.8rem] shadow-sm border border-white active:border-indigo-300 transition-all animate-in">
                                                    <div className={`text-[9px] font-black px-2 py-0.5 rounded mb-4 inline-block border ${task.priority === 'high' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{task.priority.toUpperCase()}</div>
                                                    <h4 className="font-bold text-sm leading-snug line-clamp-2">{task.title}</h4>
                                                    <div className="mt-6 flex justify-between items-center pt-4 border-t border-slate-50">
                                                        <div className="flex items-center gap-2"><div className="w-7 h-7 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center text-[10px] font-black uppercase">{task.assignee.substring(0,2)}</div><span className="text-[10px] font-bold text-slate-400">{task.assignee}</span></div>
                                                        <span className="text-[9px] font-black text-slate-300">{task.dueDate}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- Detailed Calendar View --- */}
                        {currentView === 'calendar' && (
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm animate-in">
                                <div className="flex justify-between items-center mb-8 px-2">
                                    <h3 className="text-xl font-black">{calDate.toLocaleString('th-TH', { month: 'long', year: 'numeric' })}</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => setCalDate(new Date(calDate.getFullYear(), calDate.getMonth() - 1, 1))} className="p-3 bg-slate-50 rounded-xl"><Icon name="chevronLeft" size={16}/></button>
                                        <button onClick={() => setCalDate(new Date(calDate.getFullYear(), calDate.getMonth() + 1, 1))} className="p-3 bg-slate-50 rounded-xl"><Icon name="chevronRight" size={16}/></button>
                                    </div>
                                </div>
                                <div className="calendar-grid">
                                    {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => (<div key={d} className="text-center font-black text-slate-300 text-[10px] py-3 uppercase">{d}</div>))}
                                    {calendarDays.map((date, idx) => {
                                        if (!date) return <div key={`empty-${idx}`} className="h-14 md:h-20" />;
                                        const dateStr = date.toISOString().split('T')[0];
                                        const dayTasks = tasks.filter(t => t.dueDate === dateStr);
                                        const isToday = new Date().toDateString() === date.toDateString();
                                        return (
                                            <div key={dateStr} onClick={() => dayTasks.length > 0 && setViewingTask(dayTasks[0])} className={`h-14 md:h-20 rounded-2xl flex flex-col items-center justify-center relative transition-all border border-transparent ${isToday ? 'bg-indigo-600 text-white font-black' : 'bg-slate-50 text-slate-500 active:bg-indigo-100'}`}>
                                                <span className="text-sm">{date.getDate()}</span>
                                                <div className="flex gap-1 mt-1">
                                                    {dayTasks.slice(0, 3).map(tk => (
                                                        <div key={tk.id} className={`w-1 h-1 rounded-full ${isToday ? 'bg-white' : 'bg-indigo-400'}`}></div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* --- Detailed Analytics View --- */}
                        {currentView === 'analytics' && (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm text-center flex flex-col items-center">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-10 italic">Project Completion Rate</h3>
                                    <div className="relative w-56 h-56 flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90">
                                            <circle cx="112" cy="112" r="100" stroke="currentColor" strokeWidth="20" fill="transparent" className="text-slate-50" />
                                            <circle cx="112" cy="112" r="100" stroke="currentColor" strokeWidth="20" fill="transparent" strokeDasharray="628" strokeDashoffset={628 - (628 * stats.rate) / 100} className="text-indigo-600 transition-all duration-1000" strokeLinecap="round" />
                                        </svg>
                                        <div className="absolute flex flex-col items-center">
                                            <span className="text-5xl font-black text-slate-800">{stats.rate}%</span>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase">Success</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl overflow-hidden relative">
                                    <h3 className="text-lg font-black mb-8 tracking-tight flex items-center gap-2 italic"><div className="w-2 h-2 rounded-full bg-indigo-500"></div> Team Workload Distribution</h3>
                                    <div className="space-y-8 overflow-y-auto max-h-[400px] pr-2 no-scrollbar">
                                        {stats.workload.map(w => (
                                            <div key={w.name}>
                                                <div className="flex justify-between items-end mb-3 font-bold text-[11px] uppercase tracking-widest">
                                                    <span className="flex items-center gap-3"><div className="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center text-[10px] shadow-lg">{w.name.substring(0,2)}</div>{w.name}</span>
                                                    <span className="opacity-50">{w.count} Tasks Assigned</span>
                                                </div>
                                                <div className="h-3 w-full bg-white/10 rounded-full overflow-hidden shadow-inner">
                                                    <div className="h-full bg-indigo-400 transition-all duration-1000" style={{ width: `${(w.count / (stats.total || 1)) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        ))}
                                        {members.length === 0 && <div className="py-20 text-center opacity-30 italic">ไม่พบข้อมูลสมาชิก</div>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Member Management View --- */}
                        {currentView === 'members' && (
                            <div className="space-y-6 animate-in">
                                <div className="flex justify-between items-center px-4">
                                    <h3 className="text-xl font-black text-slate-800">สมาชิกในโปรเจกต์ ({members.length})</h3>
                                    <button onClick={async () => {
                                        const n = prompt("ชื่อสมาชิกใหม่:");
                                        if(n) await db.collection(`teams_v8/${activeTeamId}/members`).add({ name: n.trim(), joinedAt: firebase.firestore.FieldValue.serverTimestamp() });
                                    }} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg shadow-indigo-100">+ เพิ่ม</button>
                                </div>
                                <div className="grid gap-4">
                                    {members.map(m => (
                                        <div key={m.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between group active:bg-slate-50">
                                            <div className="flex items-center gap-4">
                                                <div className="w-14 h-14 bg-indigo-50 text-indigo-700 rounded-[1.4rem] flex items-center justify-center font-black text-xl shadow-inner uppercase tracking-tighter">{m.name.substring(0,2)}</div>
                                                <div><h4 className="font-black text-lg leading-none text-slate-800">{m.name}</h4><p className="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">{m.name === profile.name ? 'คุณ (Me)' : 'Team Member'}</p></div>
                                            </div>
                                            {m.name !== profile.name && (
                                                <button onClick={() => {if(confirm(`ลบ ${m.name}?`)) db.doc(`teams_v8/${activeTeamId}/members/${m.id}`).delete();}} className="p-3 text-slate-200 hover:text-red-500 transition-all"><Icon name="trash" size={20}/></button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Task Edit/Create Modal */}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-t-[3rem] md:rounded-[3rem] shadow-2xl overflow-hidden animate-in">
                                <div className="p-10 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-xl font-black text-slate-800">{editingTask ? '📝 แก้ไขงาน' : '✨ สร้างงานใหม่'}</h3>
                                    <button onClick={() => setIsTaskModalOpen(false)} className="p-3 hover:bg-white rounded-full transition-all"><Icon name="x"/></button>
                                </div>
                                <form className="p-10 space-y-6" onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleSaveTask(Object.fromEntries(fd));
                                }}>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">ชื่องาน</label><input required name="title" defaultValue={editingTask?.title} placeholder="คุณต้องการจะทำอะไร..." className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none focus:ring-4 focus:ring-indigo-100 transition-all" /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">ผู้รับผิดชอบ</label><select name="assignee" defaultValue={editingTask?.assignee || profile.name} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none">{members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">กำหนดเสร็จ</label><input name="dueDate" type="date" defaultValue={editingTask?.dueDate || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">สถานะ</label><select name="status" defaultValue={editingTask?.status || 'todo'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none"><option value="todo">To Do</option><option value="in-progress">Doing</option><option value="done">Done</option></select></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">ความสำคัญ</label><select name="priority" defaultValue={editingTask?.priority || 'medium'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
                                    </div>
                                    <button className="w-full p-5 bg-indigo-600 text-white rounded-[2rem] font-black shadow-xl shadow-indigo-100 hover:-translate-y-1 active:scale-95 transition-all mt-4 uppercase">บันทึกข้อมูลและซิงค์</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Task Detail Viewing Modal */}
                    {viewingTask && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-[3.5rem] md:rounded-[3.5rem] shadow-2xl p-10 relative animate-in">
                                <button onClick={() => setViewingTask(null)} className="absolute top-10 right-10 p-3 hover:bg-slate-50 rounded-full transition-all text-slate-300"><Icon name="x" size={24}/></button>
                                <div className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase mb-8 inline-block border ${viewingTask.priority === 'high' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{viewingTask.priority} Priority</div>
                                <h3 className="text-3xl font-black text-slate-800 mb-10 leading-tight tracking-tight">{viewingTask.title}</h3>
                                <div className="space-y-5 mb-12">
                                    <div className="flex items-center gap-5 p-5 bg-slate-50 rounded-[2rem] shadow-inner"><div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg text-xl uppercase">{viewingTask.assignee.substring(0,2)}</div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Assignee</p><p className="font-bold text-slate-800 text-xl">{viewingTask.assignee}</p></div></div>
                                    <div className="flex items-center gap-5 p-5 bg-slate-50 rounded-[2rem] shadow-inner"><div className="w-14 h-14 bg-white border border-slate-100 rounded-2xl flex items-center justify-center text-indigo-600 shadow-sm"><Icon name="calendar" size={28}/></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Due Date</p><p className="font-bold text-slate-800 text-xl">{viewingTask.dueDate}</p></div></div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => {if(confirm("ลบงาน?")) db.doc(`teams_v8/${activeTeamId}/tasks/${viewingTask.id}`).delete(); setViewingTask(null);}} className="p-5 bg-red-50 text-red-500 rounded-[2rem] active:scale-95 transition-all"><Icon name="trash" size={28}/></button>
                                    <button onClick={() => {setEditingTask(viewingTask); setViewingTask(null); setIsTaskModalOpen(true);}} className="flex-1 p-5 bg-slate-900 text-white rounded-[2.2rem] font-black shadow-2xl hover:-translate-y-1 active:scale-95 transition-all uppercase">แก้ไขภารกิจ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            return <div className="h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse uppercase tracking-[0.3em] text-xs italic">Syncing Cloud Workspace...</div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
