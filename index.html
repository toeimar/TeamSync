<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeamSync Pro - Workspace</title>
    
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Global Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-nav { color: #4f46e5; font-weight: 700; background: rgba(79, 70, 229, 0.05); border-radius: 12px; }
        input, select, textarea { font-size: 16px !important; }
        .bottom-sheet { border-top-left-radius: 2rem; border-top-right-radius: 2rem; box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: #4f46e5; color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
            authDomain: "vitalvibe-c0306.firebaseapp.com",
            projectId: "vitalvibe-c0306",
            storageBucket: "vitalvibe-c0306.firebasestorage.app",
            messagingSenderId: "18887442289",
            appId: "1:18887442289:web:c179b03c6a818fa0ec80d0",
            measurementId: "G-S0JMBP3ERB"
        };

        const TELEGRAM_BOT_TOKEN = "8297881671:AAGcSq319AVyjvagyxBDV1STtdRV5WPILKs";
        const TELEGRAM_CHAT_ID = "-1003907894437";

        const appId = "ts-prod-v16-edit-name";
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Telegram Integration Function ---
        const sendTelegramNotification = async (message) => {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (err) {
                console.error("Telegram notification failed:", err);
            }
        };

        // --- Icons ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const paths = {
                dashboard: "M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 16h7v5H3v-5z",
                mytasks: "M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z",
                board: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z",
                calendar: "M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z",
                analytics: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2v-3h2v3zm4 0h-2v-5h2v5z",
                members: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
                plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
                logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
                layers: "M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z",
                edit: "M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
                x: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
                chevronRight: "M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z",
                bell: "M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><path d={paths[name] || ""} /></svg>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login'); 
            const [error, setError] = useState("");
            const [activeTeamId, setActiveTeamId] = useState(localStorage.getItem('ts_v16_active'));
            const [screen, setScreen] = useState('loading'); 
            const [view, setView] = useState('dashboard');
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isEditProfileOpen, setIsEditProfileOpen] = useState(false);
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const [notifTab, setNotifTab] = useState('personal'); 
            const [editingTask, setEditingTask] = useState(null);
            const [viewingTask, setViewingTask] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            const [selectedAssignees, setSelectedAssignees] = useState([]);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const pRef = db.collection('users_profile_v16').doc(u.uid);
                        const doc = await pRef.get();
                        if (doc.exists) {
                            setProfile(doc.data());
                            setScreen(activeTeamId ? 'workspace' : 'hub');
                        } else {
                            setScreen('setup');
                        }
                    } else {
                        setUser(null);
                        setScreen('auth');
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, [activeTeamId]);

            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId || !user) return;
                const teamPath = `teams_v16/${activeTeamId}`;
                const unsubTasks = db.collection(`${teamPath}/tasks`).onSnapshot(s => {
                    setTasks(s.docs.map(d => {
                        const data = d.data();
                        let arr = data.assignees || [];
                        if (data.assignee && arr.length === 0) arr = [data.assignee];
                        return { id: d.id, ...data, assignees: arr };
                    }));
                });
                const unsubMembers = db.collection(`${teamPath}/members`).onSnapshot(s => setMembers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection(`${teamPath}/members`).doc(user.uid).set({
                    name: profile?.name || "User",
                    email: user.email,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                return () => { unsubTasks(); unsubMembers(); };
            }, [activeTeamId, screen, user, profile?.name]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError("");
                const email = e.target.email.value;
                const pass = e.target.password.value;
                try {
                    if (authMode === 'login') await auth.signInWithEmailAndPassword(email, pass);
                    else await auth.createUserWithEmailAndPassword(email, pass);
                } catch (err) { setError(err.message); }
            };

            const handleProfileSave = async (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                if (name && user) {
                    const data = { name, email: user.email, teams: profile?.teams || [] };
                    await db.collection('users_profile_v16').doc(user.uid).set(data, { merge: true });
                    setProfile(data);
                    setIsEditProfileOpen(false);
                    if (screen === 'setup') setScreen('hub');
                }
            };

            const joinTeam = async (e) => {
                e.preventDefault();
                const tid = e.target.teamId.value.trim().toUpperCase();
                if (tid && profile) {
                    const updated = [...new Set([...(profile.teams || []), tid])];
                    await db.collection('users_profile_v16').doc(user.uid).update({ teams: updated });
                    setProfile({ ...profile, teams: updated });
                    enterTeam(tid);
                }
            };

            const enterTeam = (tid) => {
                setActiveTeamId(tid);
                localStorage.setItem('ts_v16_active', tid);
                setScreen('workspace');
                setView('dashboard');
            };

            const openCreateTask = () => {
                setEditingTask(null);
                setSelectedAssignees(profile ? [profile.name] : []);
                setIsTaskModalOpen(true);
            };

            const openEditTask = (task) => {
                setEditingTask(task);
                setSelectedAssignees(task.assignees || []);
                setViewingTask(null);
                setIsTaskModalOpen(true);
            };

            const saveTask = async (data) => {
                const path = `teams_v16/${activeTeamId}/tasks`;
                const taskData = { ...data, assignees: selectedAssignees.length > 0 ? selectedAssignees : [profile.name] };
                
                try {
                    if (editingTask) {
                        await db.doc(`${path}/${editingTask.id}`).update(taskData);
                        sendTelegramNotification(
                            `<b>📝 งานถูกแก้ไข!</b>\n` +
                            `------------------------\n` +
                            `📌 <b>ทีม:</b> #${activeTeamId}\n` +
                            `📋 <b>งาน:</b> ${taskData.title}\n` +
                            `👤 <b>ผู้รับผิดชอบ:</b> ${taskData.assignees.join(', ')}\n` +
                            `⚠️ <b>ความสำคัญ:</b> ${taskData.priority.toUpperCase()}\n` +
                            `📅 <b>กำหนดส่ง:</b> ${taskData.dueDate}\n` +
                            `🔘 <b>สถานะ:</b> ${taskData.status.toUpperCase()}\n` +
                            `------------------------\n` +
                            `<i>แก้ไขโดย: ${profile?.name}</i>`
                        );
                    } else {
                        await db.collection(path).add({ ...taskData, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                        sendTelegramNotification(
                            `<b>✨ มีงานใหม่ถูกสร้าง!</b>\n` +
                            `------------------------\n` +
                            `📌 <b>ทีม:</b> #${activeTeamId}\n` +
                            `📋 <b>งาน:</b> ${taskData.title}\n` +
                            `👤 <b>ผู้รับผิดชอบ:</b> ${taskData.assignees.join(', ')}\n` +
                            `⚠️ <b>ความสำคัญ:</b> ${taskData.priority.toUpperCase()}\n` +
                            `📅 <b>กำหนดส่ง:</b> ${taskData.dueDate}\n` +
                            `------------------------\n` +
                            `<i>สร้างโดย: ${profile?.name}</i>`
                        );
                    }
                } catch (e) {
                    console.error(e);
                }
                
                setIsTaskModalOpen(false);
                setEditingTask(null);
            };

            const deleteTask = async (taskId) => {
                const taskToDelete = tasks.find(t => t.id === taskId);
                if (window.confirm("คุณยืนยันที่จะลบงานนี้ใช่หรือไม่?")) {
                    try {
                        await db.collection('teams_v16').doc(activeTeamId).collection('tasks').doc(taskId).delete();
                        sendTelegramNotification(
                            `<b>🗑️ งานถูกลบออก!</b>\n` +
                            `📌 <b>ทีม:</b> #${activeTeamId}\n` +
                            `📋 <b>งานที่ลบ:</b> ${taskToDelete?.title}\n` +
                            `<i>โดย: ${profile?.name}</i>`
                        );
                        setViewingTask(null);
                        setIsTaskModalOpen(false);
                    } catch (err) {
                        alert(`ลบงานไม่สำเร็จ: ${err.message}`);
                    }
                }
            };

            const removeMember = async (m) => {
                if (m.id === user.uid) {
                    if (window.confirm("คุณต้องการออกจากทีมนี้ใช่หรือไม่?")) {
                        try {
                            const updatedTeams = profile.teams.filter(t => t !== activeTeamId);
                            await db.collection('users_profile_v16').doc(user.uid).update({ teams: updatedTeams });
                            await db.collection('teams_v16').doc(activeTeamId).collection('members').doc(m.id).delete();
                            sendTelegramNotification(`<b>🚪 สมาชิกออกจากทีม</b>\n📌 #${activeTeamId}\n👤 ${m.name} ได้ออกจากทีมแล้ว`);
                            setProfile({ ...profile, teams: updatedTeams });
                            setScreen('hub');
                        } catch (err) { alert(err.message); }
                    }
                } else {
                    if (window.confirm(`คุณแน่ใจหรือไม่ที่จะเตะ "${m.name}" ออกจากทีม?`)) {
                        try {
                            await db.collection('teams_v16').doc(activeTeamId).collection('members').doc(m.id).delete();
                            sendTelegramNotification(`<b>🚫 สมาชิกถูกเชิญออก</b>\n📌 #${activeTeamId}\n👤 ${m.name} ถูกลบออกจากทีมโดย ${profile?.name}`);
                        } catch (err) { alert(err.message); }
                    }
                }
            };

            const stats = useMemo(() => {
                const t = tasks.length;
                const d = tasks.filter(x => x.status === 'done').length;
                const rate = t > 0 ? Math.round((d / t) * 100) : 0;
                const workload = members.map(m => {
                    const count = tasks.filter(x => (x.assignees || []).includes(m.name) || (x.assignees || []).includes('ทุกคน')).length;
                    return { name: m.name, count };
                }).sort((a,b) => b.count - a.count);
                return { total: t, done: d, rate, workload };
            }, [tasks, members]);

            const myPersonalTasksOnly = useMemo(() => tasks.filter(t => (t.assignees || []).includes(profile?.name) && !(t.assignees || []).includes('ทุกคน')), [tasks, profile]);
            const groupTasksOnly = useMemo(() => tasks.filter(t => (t.assignees || []).includes('ทุกคน')), [tasks]);
            const myPersonalPendingTasks = useMemo(() => myPersonalTasksOnly.filter(t => t.status !== 'done'), [myPersonalTasksOnly]);
            const groupPendingTasks = useMemo(() => groupTasksOnly.filter(t => t.status !== 'done'), [groupTasksOnly]);
            const totalPendingTasks = myPersonalPendingTasks.length + groupPendingTasks.length;

            const renderAssignees = (assigneesList) => {
                if (!assigneesList || assigneesList.length === 0) return null;
                if (assigneesList.includes('ทุกคน')) {
                    return (
                        <div className="flex items-center gap-1.5">
                            <div className="w-6 h-6 rounded-lg bg-amber-100 text-amber-600 flex items-center justify-center text-[9px] font-black uppercase shadow-inner">ALL</div>
                            <span className="text-[9px] font-bold text-slate-400">ทุกคน</span>
                        </div>
                    );
                }
                return (
                    <div className="flex items-center gap-1.5">
                        <div className="flex -space-x-2">
                            <div className="w-6 h-6 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center text-[9px] font-black uppercase shadow-inner border border-white z-10">
                                {assigneesList[0].substring(0,2)}
                            </div>
                            {assigneesList.length > 1 && (
                                <div className="w-6 h-6 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center text-[9px] font-black shadow-inner border border-white z-0 pl-1">
                                    +{assigneesList.length - 1}
                                </div>
                            )}
                        </div>
                        <span className="text-[9px] font-bold text-slate-400 truncate max-w-[80px]">{assigneesList.join(', ')}</span>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-indigo-600 animate-pulse text-xs tracking-widest uppercase">Cloud Syncing...</div>;

            if (screen === 'auth') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm animate-in text-center">
                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-4 shadow-xl rotate-3 italic">T</div>
                        <h1 className="text-2xl font-black mb-1">{authMode === 'login' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก'}</h1>
                        <p className="text-slate-400 text-[10px] mb-8 uppercase tracking-widest font-bold">Cloud Identity Workspace</p>
                        {error && <div className="bg-red-50 text-red-500 p-3 rounded-xl text-[10px] font-bold mb-4">{error}</div>}
                        <form onSubmit={handleAuth} className="space-y-3 text-left">
                            <input name="email" type="email" required placeholder="อีเมล" className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-100" />
                            <input name="password" type="password" required placeholder="รหัสผ่าน (6+ ตัวอักษร)" className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-100" />
                            <button className="w-full p-4 btn-primary rounded-xl font-black shadow-lg shadow-indigo-200 mt-2">ยืนยัน</button>
                        </form>
                        <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="mt-6 text-[10px] font-bold text-indigo-600 uppercase tracking-widest underline decoration-2 underline-offset-4">
                            {authMode === 'login' ? 'ยังไม่มีบัญชี? สมัครที่นี่' : 'มีบัญชีอยู่แล้ว? เข้าสู่ระบบ'}
                        </button>
                    </div>
                </div>
            );

            const ProfileEditor = ({ title, onClose }) => (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center animate-in relative">
                        {onClose && <button onClick={onClose} className="absolute top-6 right-6 text-slate-300"><Icon name="x" size={24}/></button>}
                        <h1 className="text-2xl font-black mb-2 text-indigo-600 leading-tight">{title}</h1>
                        <p className="text-slate-400 mb-8 font-medium text-sm">ชื่อของคุณที่จะแสดงให้คนอื่นในทีมเห็น</p>
                        <form onSubmit={handleProfileSave} className="space-y-4">
                            <input name="username" required defaultValue={profile?.name} placeholder="ระบุชื่อหรือชื่อเล่น" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-center font-bold text-lg focus:ring-4 focus:ring-indigo-100 outline-none transition-all" />
                            <button className="w-full p-4 btn-primary rounded-2xl font-black text-lg shadow-xl">บันทึกข้อมูล</button>
                        </form>
                    </div>
                </div>
            );

            if (screen === 'setup') return <ProfileEditor title="ตั้งค่าโปรไฟล์" />;

            if (screen === 'hub') return (
                <div className="min-h-screen p-5 bg-slate-50 animate-in max-w-md mx-auto pb-20">
                    {isEditProfileOpen && <ProfileEditor title="แก้ไขโปรไฟล์" onClose={() => setIsEditProfileOpen(false)} />}
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg uppercase">{profile?.name.substring(0,2)}</div>
                            <div>
                                <h1 className="text-xl font-black leading-none flex items-center gap-2">สวัสดี, {profile?.name} <button onClick={() => setIsEditProfileOpen(true)} className="text-indigo-400 active:scale-90 transition-all"><Icon name="edit" size={14}/></button></h1>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Multi-Team Hub</p>
                            </div>
                        </div>
                        <button onClick={() => auth.signOut()} className="p-2 text-red-500 bg-white rounded-xl shadow-sm border border-red-50 active:scale-90"><Icon name="logout" size={18}/></button>
                    </header>
                    <div className="bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-100 mb-8">
                        <h2 className="text-sm font-black mb-4 flex items-center gap-2 text-indigo-600"><Icon name="plus" size={16}/> สร้างหรือเข้าร่วมทีมใหม่</h2>

                                    {notifTab === 'personal' && myPersonalPendingTasks.map(t => (<div key={t.id} onClick={() => { setIsNotifOpen(false); setViewingTask(t); }} className="p-4 bg-indigo-50/30 rounded-2xl cursor-pointer hover:bg-indigo-50 hover:shadow-sm active:scale-95 transition-all border border-transparent hover:border-indigo-100"><div className="flex justify-between items-start mb-2"><p className="font-bold text-sm text-slate-800 line-clamp-2">{t.title}</p><div className={`w-2 h-2 rounded-full mt-1.5 shrink-0 ${t.priority === 'high' ? 'bg-red-400' : 'bg-indigo-400'}`}></div></div><div className="text-[9px] font-black uppercase tracking-widest mt-2 text-slate-400">กำหนดส่ง: {t.dueDate}</div></div>))}
                                    {notifTab === 'group' && groupPendingTasks.length === 0 && (<div className="text-center py-10 mt-4"><div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-3">✓</div><p className="text-slate-400 text-sm font-bold">ไม่มีงานกลุ่มที่ค้างอยู่</p></div>)}
                                    {notifTab === 'group' && groupPendingTasks.map(t => (<div key={t.id} onClick={() => { setIsNotifOpen(false); setViewingTask(t); }} className="p-4 bg-amber-50/50 rounded-2xl cursor-pointer hover:bg-amber-100 hover:shadow-sm active:scale-95 transition-all border border-transparent hover:border-amber-200"><div className="flex justify-between items-start mb-2"><p className="font-bold text-sm text-slate-800 line-clamp-2">{t.title}</p><div className={`w-2 h-2 rounded-full mt-1.5 shrink-0 ${t.priority === 'high' ? 'bg-red-400' : 'bg-amber-400'}`}></div></div><div className="text-[9px] font-black uppercase tracking-widest mt-2 text-slate-400">กำหนดส่ง: {t.dueDate}</div></div>))}
                                </div>
                            </div>
                        </div>
                    )}

                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden animate-in flex flex-col max-h-screen">
                                <div className="p-6 md:p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50 shrink-0"><h3 className="text-lg font-black text-slate-800">{editingTask ? '📝 แก้ไขงาน' : '✨ สร้างงานใหม่'}</h3><button onClick={() => setIsTaskModalOpen(false)} className="p-2 hover:bg-white rounded-full text-slate-400 shadow-sm active:scale-90"><Icon name="x" size={20}/></button></div>
                                <div className="overflow-y-auto no-scrollbar pb-10">
                                    <form className="p-6 md:p-8 space-y-5" onSubmit={(e) => { e.preventDefault(); const fd = new FormData(e.target); saveTask(Object.fromEntries(fd)); }}>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">ชื่องาน</label><input required name="title" defaultValue={editingTask?.title} placeholder="งานที่ต้องทำ..." className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm focus:ring-4 focus:ring-indigo-100 outline-none" /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">รายละเอียดงาน</label><textarea name="description" defaultValue={editingTask?.description} placeholder="เพิ่มรายละเอียดเกี่ยวกับงาน..." className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm focus:ring-4 focus:ring-indigo-100 outline-none resize-none h-24"></textarea></div>
                                        <div className="space-y-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">ผู้รับผิดชอบ (กดเลือกได้มากกว่า 1 คน)</label>
                                            <div className="flex flex-wrap gap-2 pt-1">
                                                <button type="button" onClick={() => setSelectedAssignees(['ทุกคน'])} className={`px-3 py-2 rounded-xl text-xs font-bold transition-all border ${selectedAssignees.includes('ทุกคน') ? 'bg-amber-100 text-amber-600 border-amber-200 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-100'}`}>{selectedAssignees.includes('ทุกคน') ? '✓ ทุกคน (ทำร่วมกัน)' : 'ทุกคน (ทำร่วมกัน)'}</button>
                                                {members.map(m => (<button key={m.id} type="button" onClick={() => { if (selectedAssignees.includes('ทุกคน')) { setSelectedAssignees([m.name]); } else { if (selectedAssignees.includes(m.name)) { setSelectedAssignees(selectedAssignees.filter(a => a !== m.name)); } else { setSelectedAssignees([...selectedAssignees, m.name]); } } }} className={`px-3 py-2 rounded-xl text-xs font-bold transition-all border ${selectedAssignees.includes(m.name) && !selectedAssignees.includes('ทุกคน') ? 'bg-indigo-100 text-indigo-600 border-indigo-200 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-100'}`}>{selectedAssignees.includes(m.name) && !selectedAssignees.includes('ทุกคน') ? `✓ ${m.name}` : m.name}</button>))}
                                            </div>
                                            {selectedAssignees.length === 0 && <p className="text-[10px] text-red-400 font-bold mt-2">* กรุณาเลือกผู้รับผิดชอบอย่างน้อย 1 คน</p>}
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">กำหนดส่ง</label><input name="dueDate" type="date" defaultValue={editingTask?.dueDate || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none" /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">ความสำคัญ</label><select name="priority" defaultValue={editingTask?.priority || 'medium'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
                                        </div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">สถานะ</label><select name="status" defaultValue={editingTask?.status || 'todo'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none"><option value="todo">To Do</option><option value="in-progress">Doing</option><option value="done">Done</option></select></div>
                                        <button disabled={selectedAssignees.length === 0} className={`w-full p-5 rounded-[2rem] font-black shadow-xl active:scale-95 transition-all mt-6 uppercase text-xs tracking-widest ${selectedAssignees.length === 0 ? 'bg-slate-200 text-slate-400' : 'btn-primary shadow-indigo-200'}`}>บันทึกข้อมูล</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {viewingTask && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] md:rounded-[3rem] shadow-2xl p-10 relative animate-in max-h-screen overflow-y-auto no-scrollbar">
                                <button onClick={() => setViewingTask(null)} className="absolute top-10 right-10 p-3 text-slate-300 active:scale-90"><Icon name="x" size={24}/></button>
                                <div className={`px-4 py-1 rounded-lg text-[9px] font-black uppercase mb-6 inline-block border ${viewingTask.priority === 'high' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{viewingTask.priority} PRIORITY</div>
                                <h3 className="text-3xl font-black text-slate-800 mb-6 leading-tight tracking-tight">{viewingTask.title}</h3>
                                {viewingTask.description && (<div className="mb-8 p-5 bg-slate-50 rounded-2xl border border-slate-100"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-3">รายละเอียดงาน</p><p className="text-sm font-bold text-slate-600 whitespace-pre-wrap leading-relaxed">{viewingTask.description}</p></div>)}
                                <div className="space-y-4 mb-10 text-left">
                                    <div className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100"><div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white font-black shadow-lg text-lg uppercase shrink-0 ${(viewingTask.assignees || []).includes('ทุกคน') ? 'bg-amber-500 shadow-amber-100' : 'bg-indigo-600 shadow-indigo-100'}`}>{(viewingTask.assignees || []).includes('ทุกคน') ? 'ALL' : (viewingTask.assignees && viewingTask.assignees.length > 0 ? viewingTask.assignees[0].substring(0,2) : '?')}</div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Assignees</p><p className="font-bold text-slate-800 text-sm mt-2">{(viewingTask.assignees || []).join(', ')}</p></div></div>
                                    <div className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100"><div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-indigo-600 shadow-sm shrink-0"><Icon name="calendar" size={24}/></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Due Date</p><p className="font-bold text-slate-800 text-lg mt-2">{viewingTask.dueDate}</p></div></div>
                                </div>
                                <div className="flex gap-3 mt-auto pt-2">
                                    <button onClick={() => deleteTask(viewingTask.id)} className="p-5 bg-red-50 text-red-500 rounded-2xl active:scale-95 transition-all shadow-inner border border-red-100" title="ลบงาน"><Icon name="trash" size={24}/></button>
                                    <button onClick={() => openEditTask(viewingTask)} className="flex-1 p-5 bg-slate-900 text-white rounded-[2.2rem] font-black shadow-2xl active:scale-95 transition-all uppercase text-xs tracking-widest">แก้ไขข้อมูล</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
