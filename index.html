```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSync - จัดการงานทีม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slideInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-slide-in { animation: slideInUp 0.3s ease-out; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        
        /* Scrollbar สวยงาม */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Loader */
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-900">
    <div id="app"></div>

    <script type="module">
        // ======================== FIREBASE IMPORTS ========================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ======================== FIREBASE CONFIG ========================
        // นำการตั้งค่า Firebase ของคุณมาใส่ตรงนี้ หากนำไปรันบน GitHub Pages ตัวเอง
        const defaultFirebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'teamsync-app-v1';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ======================== STATE MANAGEMENT ========================
        let state = {
            user: null, // สำหรับเก็บ Auth
            username: localStorage.getItem('teamsync_username') || '',
            teamId: localStorage.getItem('teamsync_team') || '',
            tasks: [],
            teamMembers: [], // [{id, name, ...}]
            currentView: 'dashboard',
            isModalOpen: false,
            editingTask: null,
            viewingTask: null,
            isAuthReady: false,
            isLoadingData: false
        };

        // ส่งตัวแปร state ไปให้ window เพื่อให้ HTML ฝั่ง inline เรียกใช้ได้
        window.state = state;
        let unsubscribeSnapshot = null;

        // ฟังก์ชันดึง Path ของ Database (ห้ามเปลี่ยนโครงสร้างนี้ตามกฎของระบบ)
        const getDbRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'teamsync_db');

        // ======================== SYNC & AUTH ========================
        const startDataSync = () => {
            if (!state.user || !state.teamId) return;

            if (unsubscribeSnapshot) unsubscribeSnapshot();
            state.isLoadingData = true;
            window.render();

            const q = query(getDbRef());

            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                const allDocs = snapshot.docs.map(doc => doc.data());
                
                // คัดกรองเฉพาะข้อมูลของทีมนี้เท่านั้น
                const myTeamDocs = allDocs.filter(doc => doc.teamId === state.teamId);

                state.tasks = myTeamDocs.filter(doc => doc.type === 'task');
                // แปลงข้อมูลสมาชิกให้เหลือแค่รายชื่อ และรวมกับคนที่กำลังใช้อยู่
                state.teamMembers = myTeamDocs.filter(doc => doc.type === 'member').map(m => m.name);
                
                // ตรวจสอบและเพิ่มชื่อตัวเองเข้าทีมถ้ายังไม่มี
                if (state.username && !state.teamMembers.includes(state.username)) {
                    window.handleAddMember(state.username, true);
                }

                state.isLoadingData = false;
                window.render();
            }, (error) => {
                console.error("Firebase Sync Error:", error);
                state.isLoadingData = false;
                window.render();
            });
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth init error:", e);
                state.isAuthReady = true;
                window.render();
            }
        };

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            state.isAuthReady = true;
            if (user && state.teamId && state.username) {
                startDataSync();
            }
            window.render();
        });

        // เริ่มต้นการเชื่อมต่อเมื่อโหลดเว็บ
        initAuth();

        // ======================== ACTIONS (Global Handlers) ========================
        window.handleSetUsername = (e) => {
            e.preventDefault();
            const name = document.getElementById('usernameInput').value.trim();
            if (name) {
                state.username = name;
                localStorage.setItem('teamsync_username', name);
                window.render();
            }
        };

        window.handleJoinTeam = (e) => {
            e.preventDefault();
            const team = document.getElementById('teamInput').value.trim().toLowerCase();
            if (team) {
                state.teamId = team;
                localStorage.setItem('teamsync_team', team);
                startDataSync(); // เริ่มดึงข้อมูลทีม
            }
        };

        window.handleLogout = () => {
            if(confirm("คุณต้องการออกจากระบบหรือไม่?")) {
                state.username = '';
                state.teamId = '';
                localStorage.removeItem('teamsync_username');
                localStorage.removeItem('teamsync_team');
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                window.render();
            }
        };

        // การบันทึกงานขึ้น Cloud
        window.handleSaveTask = async (taskData) => {
            const taskId = state.editingTask ? state.editingTask.id : `task_${Date.now()}`;
            const payload = {
                ...taskData,
                id: taskId,
                type: 'task',
                teamId: state.teamId,
                updatedAt: Date.now()
            };

            state.isModalOpen = false;
            state.editingTask = null;

            // Optimistic update (อัปเดตหน้าจอทันที)
            if (state.tasks.find(t => t.id === taskId)) {
                state.tasks = state.tasks.map(t => t.id === taskId ? payload : t);
            } else {
                state.tasks.push(payload);
            }
            window.render();

            try {
                await setDoc(doc(getDbRef(), taskId), payload);
            } catch (e) { console.error("Save error:", e); }
        };

        window.handleDeleteTask = async (id) => {
            if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบงานนี้?')) {
                state.tasks = state.tasks.filter(t => t.id !== id);
                state.viewingTask = null;
                window.render();

                try {
                    await deleteDoc(doc(getDbRef(), id));
                } catch (e) { console.error("Delete error:", e); }
            }
        };

        window.handleChangeStatus = async (id, newStatus) => {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            task.status = newStatus;
            window.render();

            try {
                await setDoc(doc(getDbRef(), id), { ...task, updatedAt: Date.now() });
            } catch (e) { console.error("Status error:", e); }
        };

        window.handleAddMember = async (name, autoJoin = false) => {
            const memberName = name.trim();
            if (memberName && !state.teamMembers.includes(memberName)) {
                const memberId = `member_${state.teamId}_${memberName}`;
                const payload = {
                    id: memberId, type: 'member', teamId: state.teamId, name: memberName, joinedAt: Date.now()
                };

                state.teamMembers.push(memberName);
                window.render();

                try {
                    await setDoc(doc(getDbRef(), memberId), payload);
                } catch (e) { console.error("Add member error:", e); }
            }
        };

        window.handleRemoveMember = async (name) => {
            if (name === state.username) {
                alert("ไม่สามารถลบตัวเองได้ โปรดใช้วิธี ออกจากระบบ");
                return;
            }
            if (confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบ "${name}" ออกจากทีม?`)) {
                state.teamMembers = state.teamMembers.filter(m => m !== name);
                window.render();

                try {
                    const memberId = `member_${state.teamId}_${name}`;
                    await deleteDoc(doc(getDbRef(), memberId));
                } catch (e) { console.error("Remove member error:", e); }
            }
        };

        // ======================== HELPER FUNCTIONS ========================
        const getPriorityColor = (p) => {
            const colors = { 'high': 'text-red-600 bg-red-100 border-red-200', 'medium': 'text-orange-600 bg-orange-100 border-orange-200', 'low': 'text-green-600 bg-green-100 border-green-200' };
            return colors[p] || colors.medium;
        };

        const getPriorityLabel = (p) => {
            const labels = { 'high': 'ด่วนมาก', 'medium': 'ปานกลาง', 'low': 'ทั่วไป' };
            return labels[p] || 'ปานกลาง';
        };

        const getStatusLabel = (s) => {
            const labels = { 'todo': 'รอดำเนินการ', 'in-progress': 'กำลังทำ', 'done': 'เสร็จสิ้น' };
            return labels[s] || s;
        };

        const getStatusColor = (s) => {
            const colors = { 'todo': 'bg-orange-100 text-orange-700 border-orange-200', 'in-progress': 'bg-blue-100 text-blue-700 border-blue-200', 'done': 'bg-green-100 text-green-700 border-green-200' };
            return colors[s] || colors.todo;
        };

        // ======================== COMPONENTS ========================
        
        // --- 1. หน้า Login / ระบุตัวตน ---
        const LoginView = () => `
            <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 to-purple-50 p-4">
                <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full animate-fade border border-gray-100">
                    <div class="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-lg mx-auto mb-6">
                        <i class="fas fa-user-circle text-3xl"></i>
                    </div>
                    <h1 class="text-2xl font-extrabold text-center text-gray-800 mb-2">ยินดีต้อนรับสู่ TeamSync</h1>
                    <p class="text-center text-gray-500 text-sm mb-6">กรุณาระบุชื่อของคุณเพื่อเริ่มต้นใช้งาน</p>
                    
                    <form onsubmit="window.handleSetUsername(event)" class="space-y-4">
                        <div>
                            <input id="usernameInput" required type="text" placeholder="ชื่อของคุณ (เช่น เอก, พลอย)"
                                class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-center font-bold text-lg text-gray-700 transition-all">
                        </div>
                        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:opacity-90 text-white rounded-xl font-bold transition-all shadow-md">
                            ดำเนินการต่อ
                        </button>
                    </form>
                </div>
            </div>
        `;

        // --- 2. หน้าเลือกรหัสทีม ---
        const WorkspaceView = () => `
            <div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-indigo-50 to-purple-50 p-4 relative">
                <button onclick="window.handleLogout()" class="absolute top-6 right-6 text-gray-500 hover:text-red-500 font-bold text-sm bg-white px-4 py-2 rounded-full shadow-sm">
                    <i class="fas fa-sign-out-alt mr-1"></i> เปลี่ยนบัญชี
                </button>

                <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full animate-fade border border-gray-100">
                    <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center text-white shadow-lg mx-auto mb-4">
                        <i class="fas fa-users text-3xl"></i>
                    </div>
                    <h1 class="text-xl font-extrabold text-center text-gray-800">สวัสดีคุณ, ${state.username}</h1>
                    <p class="text-center text-gray-500 text-sm mb-6 mt-1">คุณต้องการทำงานใน Workspace ไหน?</p>
                    
                    <form onsubmit="window.handleJoinTeam(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 text-center">รหัสทีม / ชื่อโปรเจกต์</label>
                            <input id="teamInput" required type="text" placeholder="เช่น my-team, project-x"
                                class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-500 outline-none text-center font-bold text-lg text-gray-700 transition-all lowercase">
                        </div>
                        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-teal-600 hover:opacity-90 text-white rounded-xl font-bold transition-all shadow-md">
                            เข้าสู่พื้นที่ทำงาน
                        </button>
                    </form>
                    <div class="mt-5 p-3 bg-indigo-50 rounded-xl text-xs text-indigo-700 font-medium text-center leading-relaxed">
                        <i class="fas fa-lightbulb text-indigo-500 mb-1 block text-lg"></i>
                        ตั้งชื่อทีมใหม่เพื่อสร้างห้องใหม่ หรือกรอกชื่อทีมที่เพื่อนสร้างไว้เพื่อเข้าร่วมกลุ่มทันที
                    </div>
                </div>
            </div>
        `;

        const Navigation = () => {
            const navItems = [
                { id: 'dashboard', label: 'หน้าหลัก', icon: 'fas fa-chart-line' },
                { id: 'board', label: 'กระดาน', icon: 'fas fa-kanban' },
                { id: 'calendar', label: 'ปฏิทิน', icon: 'fas fa-calendar' },
                { id: 'analytics', label: 'วัดผล', icon: 'fas fa-bar-chart' },
                { id: 'members', label: 'ทีม', icon: 'fas fa-users' },
            ];

            return `
                <!-- Mobile Top Profile Bar -->
                <div class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-30 shadow-sm">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-100 to-purple-200 text-indigo-800 flex items-center justify-center font-bold text-xs border border-white shadow-sm">
                            ${state.username.substring(0,2)}
                        </div>
                        <div>
                            <div class="text-[10px] font-bold text-gray-400 leading-none">WORKSPACE</div>
                            <div class="font-bold text-gray-800 text-sm leading-none mt-0.5">#${state.teamId}</div>
                        </div>
                    </div>
                    <button onclick="window.handleLogout()" class="w-8 h-8 flex items-center justify-center text-red-500 bg-red-50 rounded-full hover:bg-red-100">
                        <i class="fas fa-sign-out-alt text-sm"></i>
                    </button>
                </div>

                <!-- Mobile Bottom Nav -->
                <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] pb-safe">
                    ${navItems.map(item => `
                        <button onclick="window.state.currentView='${item.id}'; window.render();" 
                                class="flex flex-col items-center p-3 w-full transition-colors ${state.currentView === item.id ? 'text-indigo-600 font-bold' : 'text-gray-400 hover:text-gray-600'}">
                            <i class="${item.icon} text-lg mb-1"></i>
                            <span class="text-[10px]">${item.label}</span>
                        </button>
                    `).join('')}
                </div>

                <!-- Desktop/iPad Sidebar Nav -->
                <div class="hidden md:flex flex-col fixed top-0 left-0 bottom-0 w-64 bg-white border-r border-indigo-50 z-40 shadow-sm">
                    <div class="p-6 font-extrabold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center gap-2">
                        <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white shadow-md">T</div>
                        TeamSync
                    </div>
                    
                    <!-- User & Workspace Info -->
                    <div class="px-5 mb-4">
                        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 relative group">
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-100 to-purple-200 text-indigo-800 flex items-center justify-center font-bold text-sm border-2 border-white shadow-sm">
                                    ${state.username.substring(0,2)}
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase">ผู้ใช้งาน</p>
                                    <p class="font-bold text-gray-800 truncate text-sm">${state.username}</p>
                                </div>
                            </div>
                            <div class="bg-white border border-gray-100 rounded-xl p-2 flex items-center justify-between">
                                <div class="overflow-hidden flex-1">
                                    <p class="text-[9px] font-bold text-indigo-400 uppercase">รหัสทีมปัจจุบัน</p>
                                    <p class="font-bold text-indigo-700 truncate text-xs"># ${state.teamId}</p>
                                </div>
                                <button onclick="window.handleLogout()" class="text-gray-400 hover:text-red-500 ml-2" title="ออกจากระบบ / เปลี่ยนทีม">
                                    <i class="fas fa-sign-out-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 px-4 space-y-1.5 overflow-y-auto">
                        ${navItems.map(item => `
                            <button onclick="window.state.currentView='${item.id}'; window.render();"
                                    class="flex items-center gap-3 w-full p-3 rounded-xl transition-all ${state.currentView === item.id ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-800'}">
                                <i class="${item.icon} w-5 text-center"></i>
                                <span>${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="p-4 border-t border-gray-100 bg-gray-50/50">
                        <button onclick="window.state.isModalOpen=true; window.state.editingTask=null; window.render();" 
                                class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all shadow-md text-sm">
                            <i class="fas fa-plus"></i> สร้างงานใหม่
                        </button>
                    </div>
                </div>
            `;
        };

        const DashboardView = () => {
            const total = state.tasks.length;
            const done = state.tasks.filter(t => t.status === 'done').length;
            const inProgress = state.tasks.filter(t => t.status === 'in-progress').length;
            const todo = state.tasks.filter(t => t.status === 'todo').length;
            
            const sortedTasks = [...state.tasks].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            const upcomingTasks = sortedTasks.filter(t => t.status !== 'done').slice(0, 5);

            return `
                <div class="p-4 md:p-8 max-w-5xl mx-auto space-y-6 animate-fade">
                    <div class="flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">ภาพรวมโครงการ</h1>
                            <p class="text-gray-500 text-sm font-medium mt-1">อัปเดตสถานะงานล่าสุดของทีม</p>
                        </div>
                        <button onclick="window.state.isModalOpen=true; window.state.editingTask=null; window.render();" class="md:hidden bg-gradient-to-r from-indigo-600 to-purple-600 text-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 relative overflow-hidden">
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium"><i class="fas fa-tasks"></i> งานทั้งหมด</div>
                            <div class="text-4xl font-extrabold">${total}</div>
                        </div>
                        <div class="bg-gradient-to-br from-emerald-400 to-teal-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2">
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium"><i class="fas fa-check-circle"></i> เสร็จสิ้น</div>
                            <div class="text-4xl font-extrabold">${done}</div>
                        </div>
                        <div class="bg-gradient-to-br from-blue-400 to-cyan-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2">
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium"><i class="fas fa-spinner"></i> กำลังทำ</div>
                            <div class="text-4xl font-extrabold">${inProgress}</div>
                        </div>
                        <div class="bg-gradient-to-br from-orange-400 to-amber-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2">
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium"><i class="fas fa-exclamation-circle"></i> รอดำเนินการ</div>
                            <div class="text-4xl font-extrabold">${todo}</div>
                        </div>
                    </div>

                    <!-- Upcoming Tasks -->
                    <div class="bg-white rounded-3xl shadow-sm border border-indigo-50 p-6 relative overflow-hidden">

                                <div>
                                    <h3 class="text-sm font-bold text-gray-500 mb-2 flex items-center gap-2"><i class="fas fa-align-left"></i> รายละเอียดงาน</h3>
                                    <div class="bg-gray-50 p-4 rounded-2xl text-gray-700 text-sm leading-relaxed whitespace-pre-wrap border border-gray-100">
                                        ${state.viewingTask.description || '<span class="text-gray-400 italic">ไม่มีการระบุรายละเอียด</span>'}
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="bg-indigo-50/50 p-3 rounded-2xl border border-indigo-50">
                                        <span class="block text-xs font-bold text-indigo-400 mb-1 flex items-center gap-1"><i class="fas fa-user text-xs"></i> ผู้รับผิดชอบ</span>
                                        <div class="flex items-center gap-2 font-bold text-gray-800 text-sm">
                                            <div class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-200 to-purple-200 text-indigo-800 flex items-center justify-center text-[10px] shadow-sm">
                                                ${state.viewingTask.assignee.substring(0,2)}
                                            </div>
                                            ${state.viewingTask.assignee}
                                        </div>
                                    </div>

                                    <div class="bg-red-50/50 p-3 rounded-2xl border border-red-50">
                                        <span class="block text-xs font-bold text-red-400 mb-1 flex items-center gap-1"><i class="fas fa-calendar text-xs"></i> กำหนดส่ง</span>
                                        <div class="font-bold text-gray-800 text-sm flex items-center gap-1">
                                            ${state.viewingTask.dueDate}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-5 border-t border-gray-100 bg-gray-50 flex gap-3 mt-auto">
                            <button onclick="window.handleDeleteTask('${state.viewingTask.id}');" class="px-4 py-3 bg-white border border-red-200 text-red-600 rounded-xl font-bold hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
                                <i class="fas fa-trash"></i>
                            </button>
                            <button onclick="window.state.editingTask=window.state.viewingTask; window.state.viewingTask=null; window.state.isModalOpen=true; window.render();" class="flex-1 px-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold hover:opacity-90 hover:shadow-lg transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-edit"></i> แก้ไขข้อมูลงาน
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        // ======================== MAIN RENDER ========================
        window.render = function() {
            const appDiv = document.getElementById('app');

            // 1. เช็คโหลด Firebase
            if (!state.isAuthReady) {
                appDiv.innerHTML = `<div class="min-h-screen flex flex-col items-center justify-center"><div class="loader mb-4"></div><p class="text-gray-500 font-bold">กำลังเชื่อมต่อระบบ Cloud...</p></div>`;
                return;
            }

            // 2. เช็คว่ามีชื่อผู้ใช้หรือยัง (ถ้ายัง ให้ล็อกอินก่อน)
            if (!state.username) {
                appDiv.innerHTML = LoginView();
                return;
            }

            // 3. เช็คว่ามีทีมหรือยัง (ถ้ายัง ให้เข้าทีมก่อน)
            if (!state.teamId) {
                appDiv.innerHTML = WorkspaceView();
                return;
            }

            // 4. แสดงหน้าแอปหลักทั้งหมดที่มีอยู่เดิม
            let content = '';
            if (state.currentView === 'dashboard') content = DashboardView();
            else if (state.currentView === 'board') content = BoardView();
            else if (state.currentView === 'calendar') content = CalendarView();
            else if (state.currentView === 'analytics') content = AnalyticsView();
            else if (state.currentView === 'members') content = MembersView();

            appDiv.innerHTML = `
                <div class="min-h-screen bg-slate-50 font-sans text-gray-900 pb-20 md:pb-0 md:pl-64">
                    ${Navigation()}
                    <main class="h-full min-h-screen pt-4 md:pt-0 relative">
                        ${content}
                    </main>
                    ${TaskModalForm()}
                    ${TaskDetailModal()}
                </div>
            `;
        };

    </script>
</body>
</html>
