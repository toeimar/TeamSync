<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSync - Team Project Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Smooth animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .animate-in {
            animation: fadeIn 0.2s ease-in-out;
        }
        
        .zoom-in-95 {
            animation: zoomIn 0.2s ease-in-out;
        }
        
        .fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-900">
    <div id="app"></div>

    <script>
        // ============================================
        // ข้อมูลจำลอง (Mock Data)
        // ============================================
        const TEAM_MEMBERS = ['เอก', 'พลอย', 'นัท', 'ส้ม'];

        const INITIAL_TASKS = [
            { id: '1', title: 'ออกแบบ UI หน้าเข้าสู่ระบบ', description: 'สร้าง Wireframe และ UI สำหรับหน้า Login บน Mobile โดยเน้นการใช้งานที่ง่ายและสะอาดตา', status: 'done', assignee: 'พลอย', dueDate: '2026-04-20', priority: 'high' },
            { id: '2', title: 'พัฒนาระบบ API ดึงข้อมูลผู้ใช้', description: 'เขียน Node.js API สำหรับหน้าโปรไฟล์ และเชื่อมต่อฐานข้อมูล MongoDB', status: 'in-progress', assignee: 'นัท', dueDate: '2026-04-25', priority: 'high' },
            { id: '3', title: 'เขียนแผนการตลาด Q2', description: 'สรุปงบประมาณและช่องทางการโปรโมทผ่าน Social Media ต่างๆ', status: 'todo', assignee: 'เอก', dueDate: '2026-04-28', priority: 'medium' },
            { id: '4', title: 'ทดสอบระบบ (UAT)', description: 'ให้ผู้ใช้กลุ่มตัวอย่างทดสอบระบบและบันทึก Feedback กลับมาปรับปรุง', status: 'todo', assignee: 'ส้ม', dueDate: '2026-05-02', priority: 'low' },
        ];

        // ============================================
        // Icon Helper Function
        // ============================================
        const createIcon = (name, size = 20, className = '') => {
            const iconMap = {
                'layout-dashboard': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>',
                'kanban': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><rect x="3" y="3" width="7" height="14"></rect><rect x="14" y="3" width="7" height="11"></rect><rect x="3" y="17" width="18" height="3"></rect></svg>',
                'calendar': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>',
                'bar-chart': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>',
                'users': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>',
                'plus': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>',
                'edit': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>',
                'trash': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>',
                'clock': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>',
                'user': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>',
                'check-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>',
                'x': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
                'alert-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
                'user-plus': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>',
                'align-left': '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="' + className + '"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>',
            };
            return iconMap[name] || '';
        };

        // ============================================
        // App State
        // ============================================
        const appState = {
            teamMembers: [...TEAM_MEMBERS],
            tasks: [...INITIAL_TASKS],
            currentView: 'dashboard',
            isModalOpen: false,
            editingTask: null,
            viewingTask: null,
        };

        // ============================================
        // Helper Functions
        // ============================================
        const getPriorityColor = (p) => {
            if (p === 'high') return 'text-red-600 bg-red-100 border-red-200';
            if (p === 'medium') return 'text-orange-600 bg-orange-100 border-orange-200';
            return 'text-green-600 bg-green-100 border-green-200';
        };

        const getPriorityLabel = (p) => {
            if (p === 'high') return 'ด่วนมาก';
            if (p === 'medium') return 'ปานกลาง';
            return 'ทั่วไป';
        };

        const getStatusLabel = (s) => {
            if (s === 'todo') return 'รอดำเนินการ';
            if (s === 'in-progress') return 'กำลังทำ';
            return 'เสร็จสิ้น';
        };

        const getStatusColor = (s) => {
            if (s === 'todo') return 'bg-orange-100 text-orange-700 border-orange-200';
            if (s === 'in-progress') return 'bg-blue-100 text-blue-700 border-blue-200';
            return 'bg-green-100 text-green-700 border-green-200';
        };

        const formatDate = (dateStr) => {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        // ============================================
        // Action Handlers
        // ============================================
        const handleSaveTask = (taskData) => {
            if (appState.editingTask) {
                const index = appState.tasks.findIndex(t => t.id === appState.editingTask.id);
                appState.tasks[index] = { ...taskData, id: appState.editingTask.id };
            } else {
                appState.tasks.push({ ...taskData, id: Date.now().toString() });
            }
            appState.isModalOpen = false;
            appState.editingTask = null;
            render();
        };

        const handleDeleteTask = (id) => {
            if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบงานนี้?')) {
                appState.tasks = appState.tasks.filter(t => t.id !== id);
                appState.viewingTask = null;
                render();
            }
        };

        const handleChangeStatus = (id, newStatus) => {
            const task = appState.tasks.find(t => t.id === id);
            if (task) task.status = newStatus;
            render();
        };

        const openAddModal = () => {
            appState.editingTask = null;
            appState.isModalOpen = true;
            appState.viewingTask = null;
            render();
        };

        const openEditModal = (task) => {
            appState.viewingTask = null;
            appState.editingTask = task;
            appState.isModalOpen = true;
            render();
        };

        const openViewModal = (task) => {
            appState.viewingTask = task;
            appState.isModalOpen = false;
            render();
        };

        const closeModals = () => {
            appState.isModalOpen = false;
            appState.editingTask = null;
            appState.viewingTask = null;
            render();
        };

        const setCurrentView = (view) => {
            appState.currentView = view;
            render();
        };

        // ============================================
        // View Components
        // ============================================
        const renderNavigation = () => {
            const navItems = [
                { id: 'dashboard', label: 'หน้าหลัก', icon: 'layout-dashboard' },
                { id: 'board', label: 'กระดานงาน', icon: 'kanban' },
                { id: 'calendar', label: 'ปฏิทิน', icon: 'calendar' },
                { id: 'analytics', label: 'วัดผล', icon: 'bar-chart' },
                { id: 'members', label: 'ทีมงาน', icon: 'users' },
            ];

            return `
                <!-- Mobile Bottom Nav -->
                <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center p-2 pb-safe z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                    ${navItems.map(item => `
                        <button onclick="setCurrentView('${item.id}')" class="flex flex-col items-center p-2 w-full rounded-lg ${appState.currentView === item.id ? 'text-indigo-600 font-bold' : 'text-gray-500'}">
                            <div class="mb-1">${createIcon(item.icon, 20)}</div>
                            <span class="text-[10px]">${item.label}</span>
                        </button>
                    `).join('')}
                </div>

                <!-- Desktop/iPad Sidebar Nav -->
                <div class="hidden md:flex flex-col fixed top-0 left-0 bottom-0 w-64 bg-white border-r border-indigo-50 z-40 shadow-sm">
                    <div class="p-6 font-extrabold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center gap-2">
                        <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white shadow-md">T</div>
                        TeamSync
                    </div>
                    <div class="flex-1 px-4 space-y-2 mt-2">
                        ${navItems.map(item => `
                            <button onclick="setCurrentView('${item.id}')" class="flex items-center gap-3 w-full p-3 rounded-xl transition-all duration-200 ${appState.currentView === item.id ? 'bg-gradient-to-r from-indigo-50 to-purple-50 text-indigo-700 font-bold shadow-sm' : 'text-gray-600 hover:bg-gray-50 hover:text-indigo-600'}">
                                <div class="${appState.currentView === item.id ? 'text-indigo-600' : ''}">${createIcon(item.icon, 20)}</div>
                                <span>${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="p-4 border-t border-gray-100 bg-gray-50/50">
                        <button onclick="openAddModal()" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-medium flex items-center justify-center gap-2 hover:shadow-lg hover:opacity-90 transition-all shadow-md text-sm">
                            ${createIcon('plus', 18)} สร้างงานใหม่
                        </button>
                    </div>
                </div>
            `;
        };

        const renderDashboard = () => {
            const total = appState.tasks.length;
            const done = appState.tasks.filter(t => t.status === 'done').length;
            const inProgress = appState.tasks.filter(t => t.status === 'in-progress').length;
            const todo = appState.tasks.filter(t => t.status === 'todo').length;
            
            const sortedTasks = [...appState.tasks].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            const upcomingTasks = sortedTasks.filter(t => t.status !== 'done').slice(0, 5);

            return `
                <div class="p-4 md:p-8 max-w-5xl mx-auto space-y-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">ภาพรวมโครงการ</h1>
                            <p class="text-gray-500 text-sm font-medium">อัปเดตสถานะงานล่าสุดของทีม</p>
                        </div>
                        <button onclick="openAddModal()" class="md:hidden bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-3 rounded-full shadow-lg">
                            ${createIcon('plus', 24)}
                        </button>
                    </div>

                    <!-- สรุปตัวเลข (Stats Cards) -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 relative overflow-hidden">
                            <div class="absolute -right-4 -bottom-4 opacity-20">${createIcon('layout-dashboard', 80)}</div>
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium">${createIcon('layout-dashboard', 16)} งานทั้งหมด</div>
                            <div class="text-4xl font-extrabold">${total}</div>
                        </div>
                        <div class="bg-gradient-to-br from-emerald-400 to-teal-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 relative overflow-hidden">
                            <div class="absolute -right-4 -bottom-4 opacity-20">${createIcon('check-circle', 80)}</div>
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium">${createIcon('check-circle', 16)} เสร็จสิ้น</div>
                            <div class="text-4xl font-extrabold">${done}</div>
                        </div>
                        <div class="bg-gradient-to-br from-blue-400 to-cyan-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 relative overflow-hidden">
                            <div class="absolute -right-4 -bottom-4 opacity-20">${createIcon('clock', 80)}</div>
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium">${createIcon('clock', 16)} กำลังทำ</div>
                            <div class="text-4xl font-extrabold">${inProgress}</div>
                        </div>
                        <div class="bg-gradient-to-br from-orange-400 to-amber-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 relative overflow-hidden">
                            <div class="absolute -right-4 -bottom-4 opacity-20">${createIcon('alert-circle', 80)}</div>
                            <div class="text-white/90 text-sm flex items-center gap-2 font-medium">${createIcon('alert-circle', 16)} รอดำเนินการ</div>
                            <div class="text-4xl font-extrabold">${todo}</div>
                        </div>
                    </div>

                    <!-- งานที่ใกล้ถึงกำหนด -->
                    <div class="bg-white rounded-3xl shadow-sm border border-indigo-50 p-6 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                        <h2 class="text-lg font-bold text-gray-800 mb-5 flex items-center gap-2">
                            ${createIcon('clock', 20)} งานที่ใกล้ถึงกำหนด (ยังไม่เสร็จ)
                        </h2>
                        <div class="space-y-3">
                            ${upcomingTasks.length === 0 ? `
                                <p class="text-gray-400 text-center py-4 font-medium">ไม่มีงานค้าง 🎉</p>
                            ` : upcomingTasks.map(task => `
                                <div onclick="openViewModal(JSON.parse('${JSON.stringify(task).replace(/'/g, "&apos;")}')" class="flex justify-between items-center p-3.5 hover:bg-indigo-50/50 rounded-2xl border border-gray-100 hover:border-indigo-200 transition-all cursor-pointer group">
                                    <div>
                                        <h3 class="font-bold text-gray-800 group-hover:text-indigo-700 transition-colors">${task.title}</h3>
                                        <div class="flex gap-4 text-xs text-gray-500 mt-1.5 font-medium">
                                            <span class="flex items-center gap-1.5"><div class="w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-[8px] font-bold">${task.assignee.substring(0,2)}</div> ${task.assignee}</span>
                                            <span class="flex items-center gap-1 text-red-500 bg-red-50 px-2 py-0.5 rounded-md">${createIcon('calendar', 12)} ดิว: ${task.dueDate}</span>
                                        </div>
                                    </div>
                                    <span class="text-xs px-3 py-1.5 rounded-full font-bold shadow-sm ${task.status === 'in-progress' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}">
                                        ${getStatusLabel(task.status)}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        const renderBoard = () => {
            const columns = [
                { id: 'todo', title: 'รอดำเนินการ', color: 'bg-orange-50/60 text-orange-800 border-orange-100', dot: 'bg-orange-500' },
                { id: 'in-progress', title: 'กำลังทำ', color: 'bg-blue-50/60 text-blue-800 border-blue-100', dot: 'bg-blue-500' },
                { id: 'done', title: 'เสร็จสิ้น', color: 'bg-green-50/60 text-green-800 border-green-100', dot: 'bg-green-500' },
            ];

            return `
                <div class="p-4 md:p-8 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">กระดานงานของทีม</h1>
                        <button onclick="openAddModal()" class="hidden md:flex bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-5 py-2.5 rounded-xl items-center gap-2 hover:shadow-lg hover:opacity-90 transition-all text-sm font-medium">
                            ${createIcon('plus', 18)} เพิ่มงาน
                        </button>
                    </div>

                    <!-- Columns Grid -->
                    <div class="flex-1 overflow-x-auto pb-4">
                        <div class="flex flex-col md:flex-row gap-6 min-w-full md:min-w-[800px] h-full">
                            ${columns.map(col => `
                                <div class="flex-1 rounded-3xl p-4 flex flex-col h-full border ${col.color} shadow-sm min-h-[300px]">
                                    <div class="flex items-center justify-between mb-4 px-2">
                                        <h3 class="font-bold text-gray-800 flex items-center gap-2 text-lg">
                                            <div class="w-3 h-3 rounded-full ${col.dot} shadow-sm"></div>
                                            ${col.title}
                                        </h3>
                                        <span class="text-sm font-bold text-gray-700 bg-white/80 px-3 py-1 rounded-full shadow-sm">
                                            ${appState.tasks.filter(t => t.status === col.id).length}
                                        </span>
                                    </div>

        // Global Handlers
        // ============================================
        window.openAddModal = openAddModal;
        window.openEditModal = openEditModal;
        window.openViewModal = openViewModal;
        window.closeModals = closeModals;
        window.setCurrentView = setCurrentView;
        window.handleDeleteTask = handleDeleteTask;
        window.handleChangeStatus = handleChangeStatus;

        // ============================================
        // Render Function
        // ============================================
        function render() {
            const app = document.getElementById('app');
            
            let content = '';
            if (appState.currentView === 'dashboard') content = renderDashboard();
            else if (appState.currentView === 'board') content = renderBoard();
            else if (appState.currentView === 'calendar') content = renderCalendar();
            else if (appState.currentView === 'analytics') content = renderAnalytics();
            else if (appState.currentView === 'members') content = renderMembers();

            app.innerHTML = `
                <div class="min-h-screen bg-slate-50 font-sans text-gray-900 pb-20 md:pb-0 md:pl-64">
                    ${renderNavigation()}
                    
                    <main class="h-full min-h-screen pt-4 md:pt-0">
                        ${content}
                    </main>

                    ${renderTaskModal()}
                    ${renderViewModal()}
                </div>
            `;
        }

        // ============================================
        // Initial Render
        // ============================================
        render();
    </script>
</body>
</html>
