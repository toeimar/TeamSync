<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSync Cloud - จัดการงานทีมแบบเรียลไทม์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slideInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-in { animation: slideInUp 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        
        /* Scrollbar สวยงาม */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Loader */
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #6366f1;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-900 selection:bg-indigo-100 selection:text-indigo-900">
    <div id="app"></div>

    <!-- เปลี่ยนมาใช้ type="module" เพื่อรองรับ Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ======================== FIREBASE SETUP ========================
        // ⚠️ หากคุณนำโค้ดนี้ไปรันบน GitHub Pages ให้แก้ไข firebaseConfig ด้านล่างด้วยข้อมูลจาก Firebase Console ของคุณ
        const defaultFirebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'teamsync-default-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ======================== STATE MANAGEMENT ========================
        const state = {
            user: null,
            teamId: localStorage.getItem('teamsync_last_team') || null, // จำชื่อทีมที่เคยเข้าล่าสุด
            tasks: [],
            teamMembers: [],
            currentView: 'dashboard',
            isModalOpen: false,
            editingTask: null,
            viewingTask: null,
            isLoadingAuth: true,
            isLoadingData: false,
            syncStatus: 'disconnected', // disconnected, syncing, connected
            errorMsg: null
        };

        // ส่งตัวแปร state ไปให้ window เพื่อให้ฟังก์ชันใน HTML เรียกใช้ได้
        window.state = state;

        let unsubscribeSnapshot = null;

        // ======================== DATABASE & SYNC ========================
        const getCollectionRef = () => {
            // โครงสร้าง Path ฐานข้อมูล (ตามกฎต้องใช้ Path นี้)
            return collection(db, 'artifacts', appId, 'public', 'data', 'teamsync_data');
        };

        const startDataSync = () => {
            if (!state.user || !state.teamId) return;

            if (unsubscribeSnapshot) unsubscribeSnapshot();
            
            state.isLoadingData = true;
            state.syncStatus = 'syncing';
            render();

            const collRef = getCollectionRef();
            const q = query(collRef); // ดึงข้อมูลทั้งหมด แล้วมากรองในเครื่อง (ตามกฎ Rule 2)

            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                const allDocs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // กรองข้อมูลเฉพาะของทีม (Workspace) นี้
                const myTeamDocs = allDocs.filter(doc => doc.teamId === state.teamId);

                state.tasks = myTeamDocs.filter(doc => doc.type === 'task');
                state.teamMembers = myTeamDocs.filter(doc => doc.type === 'member');

                state.isLoadingData = false;
                state.syncStatus = 'connected';
                render();
            }, (error) => {
                console.error("Firebase Sync Error:", error);
                state.errorMsg = "เกิดข้อผิดพลาดในการดึงข้อมูลจากเซิร์ฟเวอร์";
                state.syncStatus = 'disconnected';
                render();
            });
        };

        // ======================== AUTHENTICATION ========================
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth init error:", e);
                state.errorMsg = "ไม่สามารถเชื่อมต่อระบบยืนยันตัวตนได้";
                state.isLoadingAuth = false;
                render();
            }
        };

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            state.isLoadingAuth = false;
            
            if (user && state.teamId) {
                startDataSync(); // เริ่มซิงค์ข้อมูลถ้ามีรหัสทีมแล้ว
            }
            render();
        });

        // เริ่มต้นการ Login อัตโนมัติ
        initAuth();


        // ======================== ACTIONS (เปิดใช้งาน global scope) ========================
        window.handleJoinTeam = (e) => {
            e.preventDefault();
            const teamInput = document.getElementById('teamNameInput').value.trim().toLowerCase();
            if (teamInput) {
                state.teamId = teamInput;
                localStorage.setItem('teamsync_last_team', teamInput);
                startDataSync();
            }
        };

        window.handleLogoutTeam = () => {
            state.teamId = null;
            localStorage.removeItem('teamsync_last_team');
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            state.tasks = [];
            state.teamMembers = [];
            state.currentView = 'dashboard';
            render();
        };

        window.handleSaveTask = async (taskData) => {
            const taskId = state.editingTask ? state.editingTask.id : `task_${crypto.randomUUID()}`;
            const payload = {
                ...taskData,
                type: 'task',
                teamId: state.teamId,
                updatedAt: Date.now()
            };

            // อัปเดต UI ทันที (Optimistic Update)
            if (state.editingTask) {
                state.tasks = state.tasks.map(t => t.id === taskId ? {id: taskId, ...payload} : t);
            } else {
                state.tasks.push({id: taskId, ...payload});
            }
            state.isModalOpen = false;
            state.editingTask = null;
            render();

            // บันทึกลงฐานข้อมูล
            try {
                await setDoc(doc(getCollectionRef(), taskId), payload);
            } catch (e) {
                console.error("Save error:", e);
                state.errorMsg = "บันทึกข้อมูลไม่สำเร็จ";
                render();
            }
        };

        window.handleDeleteTask = async (id) => {
            // ใช้ Modal จำลองแทน confirm() เพื่อความสวยงาม (ในที่นี้ใช้ State)
            state.tasks = state.tasks.filter(t => t.id !== id);
            state.viewingTask = null;
            render();

            try {
                await deleteDoc(doc(getCollectionRef(), id));
            } catch (e) {
                console.error("Delete error:", e);
            }
        };

        window.handleChangeStatus = async (id, newStatus) => {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;

            task.status = newStatus;
            render(); // อัปเดต UI ทันที

            try {
                await setDoc(doc(getCollectionRef(), id), { ...task, updatedAt: Date.now() });
            } catch (e) {
                console.error("Update status error:", e);
            }
        };

        window.handleAddMember = async (name) => {
            if (!name.trim()) return;
            const memberName = name.trim();
            
            // เช็คชื่อซ้ำ
            if (state.teamMembers.some(m => m.name === memberName)) return;

            const memberId = `member_${crypto.randomUUID()}`;
            const payload = { name: memberName, type: 'member', teamId: state.teamId, addedAt: Date.now() };

            state.teamMembers.push({id: memberId, ...payload});
            render();

            try {
                await setDoc(doc(getCollectionRef(), memberId), payload);
            } catch (e) {
                console.error("Add member error:", e);
            }
        };

        window.handleRemoveMember = async (id) => {
            state.teamMembers = state.teamMembers.filter(m => m.id !== id);
            render();

            try {
                await deleteDoc(doc(getCollectionRef(), id));
            } catch (e) {
                console.error("Remove member error:", e);
            }
        };

        window.closeErrorMsg = () => {
            state.errorMsg = null;
            render();
        };

        // ======================== HELPER FUNCTIONS ========================
        const getPriorityColor = (p) => {
            const colors = { 'high': 'text-red-600 bg-red-100 border-red-200', 'medium': 'text-orange-600 bg-orange-100 border-orange-200', 'low': 'text-green-600 bg-green-100 border-green-200' };
            return colors[p] || colors.medium;
        };
        const getPriorityLabel = (p) => {
            const labels = { 'high': 'ด่วนมาก', 'medium': 'ปานกลาง', 'low': 'ทั่วไป' };
            return labels[p] || 'ปานกลาง';
        };
        const getStatusLabel = (s) => {
            const labels = { 'todo': 'รอดำเนินการ', 'in-progress': 'กำลังทำ', 'done': 'เสร็จสิ้น' };
            return labels[s] || s;
        };
        const getStatusColor = (s) => {
            const colors = { 'todo': 'bg-orange-100 text-orange-700 border-orange-200', 'in-progress': 'bg-blue-100 text-blue-700 border-blue-200', 'done': 'bg-green-100 text-green-700 border-green-200' };
            return colors[s] || colors.todo;
        };


        // ======================== UI COMPONENTS ========================

        const ErrorToast = () => {
            if (!state.errorMsg) return '';
            return `
                <div class="fixed top-4 right-4 z-50 animate-slide-in bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-lg flex items-center justify-between max-w-sm">
                    <div class="flex items-center">
                        <i class="fas fa-exclamation-circle text-red-500 mr-3"></i>
                        <p class="text-sm text-red-700 font-medium">${state.errorMsg}</p>
                    </div>
                    <button onclick="window.closeErrorMsg()" class="text-red-400 hover:text-red-600 ml-4">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
        };

        const SyncIndicator = () => {
            if (state.syncStatus === 'syncing') {
                return `<div class="flex items-center gap-1.5 text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md"><i class="fas fa-sync fa-spin"></i> กำลังซิงค์...</div>`;
            } else if (state.syncStatus === 'connected') {
                return `<div class="flex items-center gap-1.5 text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-md" title="ออนไลน์"><div class="w-2 h-2 rounded-full bg-emerald-500"></div> ออนไลน์</div>`;
            }
            return `<div class="flex items-center gap-1.5 text-xs font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-md"><div class="w-2 h-2 rounded-full bg-gray-400"></div> ออฟไลน์</div>`;
        };

        const LoadingScreen = () => `
            <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-xl mb-6 animate-pulse">
                    <span class="text-3xl font-extrabold">T</span>
                </div>
                <div class="loader mb-4"></div>
                <p class="text-gray-500 font-medium">กำลังเชื่อมต่อระบบ Cloud...</p>
            </div>
        `;

        const WorkspaceLoginScreen = () => `
            <div class="min-h-screen flex items-center justify-center bg-slate-50 p-4 animate-fade-in">
                <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                    <div class="p-8 text-center bg-gradient-to-br from-indigo-50 to-purple-50 border-b border-gray-100">
                        <div class="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-lg mx-auto mb-4">
                            <span class="text-3xl font-extrabold">T</span>
                        </div>
                        <h1 class="text-2xl font-extrabold text-gray-800">TeamSync</h1>
                        <p class="text-gray-500 text-sm mt-1">เข้าสู่พื้นที่ทำงานของทีมคุณ</p>
                    </div>
                    
                    <form onsubmit="window.handleJoinTeam(event)" class="p-8 space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">ชื่อ Workspace / รหัสทีม</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-users text-gray-400"></i>
                                </div>
                                <input id="teamNameInput" type="text" required autofocus
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all font-medium" 
                                    placeholder="เช่น marketing-q2, my-startup">
                            </div>
                            <p class="mt-2 text-xs text-gray-500">หากระบุชื่อใหม่ ระบบจะสร้างพื้นที่ทำงานให้ทันที</p>
                        </div>

                        <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                            เข้าสู่ระบบทีม
                        </button>
                    </form>
                </div>
            </div>
        `;

        const Navigation = () => {
            const navItems = [
                { id: 'dashboard', label: 'หน้าหลัก', icon: 'fas fa-chart-line' },
                { id: 'board', label: 'กระดาน', icon: 'fas fa-kanban' },
                { id: 'calendar', label: 'ปฏิทิน', icon: 'fas fa-calendar' },
                { id: 'analytics', label: 'วัดผล', icon: 'fas fa-bar-chart' },
                { id: 'members', label: 'ทีม', icon: 'fas fa-users' },
            ];

            return `
                <!-- Mobile Top Bar -->
                <div class="md:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-gray-100 sticky top-0 z-30 shadow-sm">
                    <div class="font-extrabold text-xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center gap-2">
                        <div class="w-6 h-6 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white text-xs">T</div>
                    </div>
                    <div class="flex items-center gap-3">
                        ${SyncIndicator()}
                        <button onclick="window.state.isModalOpen=true; window.state.editingTask=null; window.render();" class="text-indigo-600 bg-indigo-50 w-8 h-8 rounded-full flex items-center justify-center">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>

                <!-- Mobile Bottom Nav -->
                <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] pb-safe">
                    ${navItems.map(item => `
                        <button onclick="window.state.currentView='${item.id}'; window.render();" 
                                class="flex flex-col items-center p-3 w-full ${state.currentView === item.id ? 'text-indigo-600 font-bold' : 'text-gray-400 hover:text-gray-600 transition-colors'}">
                            <i class="${item.icon} text-lg mb-1"></i>
                            <span class="text-[10px]">${item.label}</span>
                        </button>
                    `).join('')}
                </div>

                <!-- Desktop/iPad Sidebar Nav -->
                <div class="hidden md:flex flex-col fixed top-0 left-0 bottom-0 w-64 bg-white border-r border-indigo-50 z-40 shadow-sm">
                    <div class="p-6 font-extrabold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center gap-2">
                        <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white shadow-md">T</div>
                        TeamSync
                    </div>
                    
                    <!-- Team Info -->
                    <div class="px-6 pb-4 border-b border-gray-100">
                        <div class="bg-gray-50 rounded-xl p-3 flex justify-between items-center border border-gray-100">
                            <div class="overflow-hidden">
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">Workspace</p>
                                <p class="text-sm font-bold text-gray-800 truncate" title="${state.teamId}">${state.teamId}</p>
                            </div>
                            <button onclick="window.handleLogoutTeam()" class="text-gray-400 hover:text-red-500 bg-white shadow-sm w-8 h-8 rounded-lg flex items-center justify-center transition-colors" title="ออกจากระบบ">
                                <i class="fas fa-sign-out-alt"></i>
                            </button>
                        </div>
                        <div class="mt-3 flex justify-between items-center">
                            ${SyncIndicator()}
                        </div>
                    </div>

                    <div class="flex-1 px-4 space-y-1.5 mt-4 overflow-y-auto">
                        ${navItems.map(item => `
                            <button onclick="window.state.currentView='${item.id}'; window.render();"
                                    class="flex items-center gap-3 w-full p-3 rounded-xl transition-all ${state.currentView === item.id ? 'bg-gradient-to-r from-indigo-50 to-purple-50 text-indigo-700 font-bold shadow-sm' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-800 font-medium'}">
                                <i class="${item.icon} w-5 text-center"></i>
                                <span>${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="p-4 border-t border-gray-100 bg-gray-50/50">
                        <button onclick="window.state.isModalOpen=true; window.state.editingTask=null; window.render();" 
                                class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-medium flex items-center justify-center gap-2 hover:shadow-lg hover:-translate-y-0.5 transition-all shadow-md text-sm">
                            <i class="fas fa-plus"></i> สร้างงานใหม่
                        </button>
                    </div>
                </div>
            `;
        };

        // ... [ส่วน View ต่างๆ Dashboard, Board, Calendar, Analytics คงเดิม แต่ปรับใช้ window.state.tasks] ...
        const DashboardView = () => {
            const total = state.tasks.length;
            const done = state.tasks.filter(t => t.status === 'done').length;
            const inProgress = state.tasks.filter(t => t.status === 'in-progress').length;
            const todo = state.tasks.filter(t => t.status === 'todo').length;
            
            const sortedTasks = [...state.tasks].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            const upcomingTasks = sortedTasks.filter(t => t.status !== 'done').slice(0, 5);

            return `
                <div class="p-4 md:p-8 max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <div class="flex justify-between items-end">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">ภาพรวมโครงการ</h1>
                            <p class="text-gray-500 text-sm font-medium mt-1">อัปเดตสถานะงานล่าสุดของทีม <span class="text-indigo-600 font-bold">#${state.teamId}</span></p>
                        </div>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 relative overflow-hidden transform hover:scale-[1.02] transition-transform cursor-default">
                            <div class="text-white/80 text-sm flex items-center gap-2 font-medium"><i class="fas fa-tasks"></i> งานทั้งหมด</div>
                            <div class="text-4xl font-extrabold">${total}</div>
                        </div>
                        <div class="bg-gradient-to-br from-emerald-400 to-teal-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 transform hover:scale-[1.02] transition-transform">
                            <div class="text-white/80 text-sm flex items-center gap-2 font-medium"><i class="fas fa-check-circle"></i> เสร็จสิ้น</div>
                            <div class="text-4xl font-extrabold">${done}</div>
                        </div>
                        <div class="bg-gradient-to-br from-blue-400 to-cyan-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 transform hover:scale-[1.02] transition-transform">
                            <div class="text-white/80 text-sm flex items-center gap-2 font-medium"><i class="fas fa-spinner"></i> กำลังทำ</div>
                            <div class="text-4xl font-extrabold">${inProgress}</div>
                        </div>
                        <div class="bg-gradient-to-br from-orange-400 to-amber-500 p-5 rounded-3xl shadow-md text-white flex flex-col gap-2 transform hover:scale-[1.02] transition-transform">
                            <div class="text-white/80 text-sm flex items-center gap-2 font-medium"><i class="fas fa-exclamation-circle"></i> รอดำเนินการ</div>
                            <div class="text-4xl font-extrabold">${todo}</div>
                        </div>
                    </div>

                    <!-- Upcoming Tasks -->
                    <div class="bg-white rounded-3xl shadow-sm border border-indigo-50 p-6 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                        <h2 class="text-lg font-bold text-gray-800 mb-5 flex items-center gap-2">
                            <i class="fas fa-clock text-indigo-500"></i> งานที่ใกล้ถึงกำหนด
                        </h2>
                        <div class="space-y-3">
                            ${state.isLoadingData ? '<div class="text-center py-8"><div class="loader mx-auto"></div></div>' :
                            upcomingTasks.length === 0 ? '<p class="text-gray-400 text-center py-8 font-medium bg-gray-50 rounded-2xl border border-dashed border-gray-200">ไม่มีงานค้าง 🎉 พักผ่อนได้เลย!</p>' : 
                            upcomingTasks.map(task => `
                                <div onclick="window.state.viewingTask=window.state.tasks.find(t => t.id==='${task.id}'); window.render();" 
                                     class="flex justify-between items-center p-3.5 hover:bg-indigo-50/50 rounded-2xl border border-gray-100 hover:border-indigo-200 transition-all cursor-pointer group">
                                    <div>
                                        <h3 class="font-bold text-gray-800 group-hover:text-indigo-700 transition-colors">${task.title}</h3>
                                        <div class="flex gap-4 text-xs text-gray-500 mt-1.5 font-medium">
                                            <span class="flex items-center gap-1.5"><div class="w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-[8px] font-bold">${task.assignee.substring(0,2)}</div> ${task.assignee}</span>
                                            <span class="flex items-center gap-1 text-red-500 bg-red-50 px-2 py-0.5 rounded-md"><i class="fas fa-calendar text-[10px]"></i> ${task.dueDate}</span>
                                        </div>
                                    </div>
                                    <span class="text-xs px-3 py-1.5 rounded-full font-bold shadow-sm border ${getStatusColor(task.status)}">
                                        ${getStatusLabel(task.status)}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        const BoardView = () => {
            const columns = [
                { id: 'todo', title: 'รอดำเนินการ', color: 'bg-orange-50/40 text-orange-800 border-orange-100', dot: 'bg-orange-500' },
                { id: 'in-progress', title: 'กำลังทำ', color: 'bg-blue-50/40 text-blue-800 border-blue-100', dot: 'bg-blue-500' },
                { id: 'done', title: 'เสร็จสิ้น', color: 'bg-green-50/40 text-green-800 border-green-100', dot: 'bg-green-500' },
            ];

            return `
                <div class="p-4 md:p-8 h-full flex flex-col animate-fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">กระดานงาน</h1>
                    </div>

                    ${state.isLoadingData ? '<div class="flex-1 flex items-center justify-center"><div class="loader"></div></div>' : `
                    <div class="flex-1 overflow-x-auto pb-4">
                        <div class="flex flex-col md:flex-row gap-6 min-w-full md:min-w-[800px] h-full">
                            ${columns.map(col => `
                                <div class="flex-1 rounded-3xl p-4 flex flex-col h-full border ${col.color} shadow-sm min-h-[300px]">
                                    <div class="flex items-center justify-between mb-4 px-2">
                                        <h3 class="font-bold text-gray-800 flex items-center gap-2 text-lg">
                                            <div class="w-3 h-3 rounded-full ${col.dot} shadow-sm"></div>
                                            ${col.title}
                                        </h3>
                                        <span class="text-sm font-bold text-gray-700 bg-white/80 px-3 py-1 rounded-full shadow-sm">
                                            ${state.tasks.filter(t => t.status === col.id).length}
                                        </span>
                                    </div>
                                    
                                    <div class="flex-1 space-y-3 overflow-y-auto pr-1">
                                        ${state.tasks.filter(t => t.status === col.id).map(task => `
                                            <div onclick="window.state.viewingTask=window.state.tasks.find(t => t.id==='${task.id}'); window.render();" 
                                                 class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-indigo-300 transition-all group cursor-pointer relative overflow-hidden">
                                                <div class="absolute left-0 top-0 bottom-0 w-1 ${task.priority==='high'?'bg-red-400':task.priority==='low'?'bg-green-400':'bg-orange-400'}"></div>
                                                <div class="flex justify-between items-start mb-3 pl-2">
                                                    <span class="text-[10px] font-bold px-2 py-1 rounded-md border ${getPriorityColor(task.priority)}">
                                                        ${getPriorityLabel(task.priority)}
                                                    </span>
                                                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onclick="event.stopPropagation(); window.state.editingTask=window.state.tasks.find(t => t.id==='${task.id}'); window.state.isModalOpen=true; window.render();" class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                                                            <i class="fas fa-edit text-sm"></i>
                                                        </button>
                                                        <!-- ลบปุ่ม Trash ออกจากบอร์ด ให้ไปลบใน Detail แทนเพื่อป้องกันการลบผิด -->
                                                    </div>
                                                </div>
                                                <h4 class="font-bold text-gray-800 text-sm mb-2 group-hover:text-indigo-700 pl-2">${task.title}</h4>
                                                
                                                <div class="flex items-center justify-between border-t border-gray-50 pt-3 mt-3 pl-2">
                                                    <div class="flex items-center gap-2 text-xs text-gray-600 font-medium">
                                                        <div class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 text-indigo-700 flex items-center justify-center text-[10px] font-bold shadow-sm">
                                                            ${task.assignee.substring(0,2)}
                                                        </div>
                                                        <span class="truncate max-w-[60px]">${task.assignee}</span>
                                                    </div>
                                                    
                                                    <select onchange="event.stopPropagation(); window.handleChangeStatus('${task.id}', this.value);" 
                                                            class="text-xs bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-gray-700 outline-none hover:border-indigo-300 font-bold cursor-pointer transition-colors focus:ring-2 focus:ring-indigo-100">
                                                        <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>รอดำเนินการ</option>
                                                        <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>กำลังทำ</option>
                                                        <option value="done" ${task.status === 'done' ? 'selected' : ''}>เสร็จสิ้น</option>
                                                    </select>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    `}
                </div>
            `;
        };

        const MembersView = () => {
            return `
                <div class="p-4 md:p-8 max-w-4xl mx-auto h-full flex flex-col animate-fade-in">
                    <h1 class="text-2xl font-bold text-gray-800 mb-6">จัดการสมาชิกทีม</h1>
                    
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="md:col-span-1 bg-white p-6 rounded-3xl shadow-sm border border-indigo-50 h-fit">
                            <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fas fa-user-plus text-indigo-500"></i> เพิ่มสมาชิก</h2>
                            <form onsubmit="event.preventDefault(); window.handleAddMember(document.getElementById('memberInput').value); document.getElementById('memberInput').value = '';" class="space-y-4">
                                <div>
                                    <input id="memberInput" required type="text" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-sm shadow-sm" placeholder="ระบุชื่อ (เช่น นัท)..." />
                                </div>
                                <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold hover:shadow-lg hover:opacity-90 transition-all text-sm">
                                    เพิ่มเข้าทีม
                                </button>
                            </form>
                        </div>

                        <div class="md:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-indigo-50">
                            <div class="flex justify-between items-center mb-5">
                                <h2 class="font-bold text-gray-800 flex items-center gap-2"><i class="fas fa-users text-purple-500"></i> สมาชิกในทีม</h2>
                                <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">${state.teamMembers.length} คน</span>
                            </div>
                            
                            ${state.isLoadingData ? '<div class="flex justify-center py-8"><div class="loader"></div></div>' : `
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                ${state.teamMembers.length === 0 ? '<p class="text-gray-400 text-sm col-span-2 text-center py-4">ยังไม่มีสมาชิกในทีม</p>' : 
                                state.teamMembers.map(member => `
                                    <div class="flex items-center justify-between p-3 border border-gray-100 rounded-2xl hover:border-indigo-200 hover:shadow-sm transition-all group bg-gray-50/50">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-100 to-purple-200 text-indigo-800 flex items-center justify-center font-bold shadow-sm border border-white">
                                                ${member.name.substring(0,2)}
                                            </div>
                                            <span class="font-bold text-gray-700">${member.name}</span>
                                        </div>
                                        <button onclick="if(confirm('ลบสมาชิกนี้?')) window.handleRemoveMember('${member.id}');" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors md:opacity-0 group-hover:opacity-100">
                                            <i class="fas fa-trash text-sm"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        };

        const TaskModalForm = () => {
            if (!state.isModalOpen) return '';

            const formData = state.editingTask || {
                title: '', description: '', status: 'todo', 
                assignee: state.teamMembers.length > 0 ? state.teamMembers[0].name : '', 
                dueDate: new Date().toISOString().split('T')[0], // วันนี้
                priority: 'medium'
            };

            return `
                <div class="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl border border-white animate-slide-in">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-gray-50 to-white">
                            <h2 class="font-extrabold text-gray-800 text-lg">${state.editingTask ? '📝 แก้ไขงาน' : '✨ สร้างงานใหม่'}</h2>
                            <button onclick="window.state.isModalOpen=false; window.render();" class="text-gray-400 hover:text-gray-700 bg-gray-100 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 transition-colors">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        
                        <form onsubmit="event.preventDefault(); 
                            window.handleSaveTask({
                                title: document.getElementById('taskTitle').value,
                                description: document.getElementById('taskDesc').value,
                                assignee: document.getElementById('taskAssignee').value || 'ไม่ระบุ',
                                dueDate: document.getElementById('taskDate').value,
                                status: document.getElementById('taskStatus').value,
                                priority: document.getElementById('taskPriority').value
                            });" 
                             class="p-6 space-y-4 text-sm">
                            
                            <div>
                                <label class="block text-gray-700 font-bold mb-1.5">ชื่องาน <span class="text-red-500">*</span></label>
                                <input id="taskTitle" required type="text" value="${formData.title}" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm" placeholder="ระบุชื่องาน..." />
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 font-bold mb-1.5">รายละเอียด</label>
                                <textarea id="taskDesc" rows="2" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm" placeholder="รายละเอียดเพิ่มเติม...">${formData.description}</textarea>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-gray-700 font-bold mb-1.5">ผู้รับผิดชอบ</label>
                                    <select id="taskAssignee" class="w-full border border-gray-200 rounded-xl p-3 bg-white focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer">
                                        <option value="">-- เลือก --</option>
                                        ${state.teamMembers.map(m => `<option value="${m.name}" ${m.name === formData.assignee ? 'selected' : ''}>${m.name}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-bold mb-1.5">กำหนดส่ง</label>
                                    <input id="taskDate" required type="date" value="${formData.dueDate}" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer" />
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-gray-700 font-bold mb-1.5">สถานะ</label>
                                    <select id="taskStatus" class="w-full border border-gray-200 rounded-xl p-3 bg-white focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer">
                                        <option value="todo" ${formData.status === 'todo' ? 'selected' : ''}>รอดำเนินการ</option>
                                        <option value="in-progress" ${formData.status === 'in-progress' ? 'selected' : ''}>กำลังทำ</option>
                                        <option value="done" ${formData.status === 'done' ? 'selected' : ''}>เสร็จสิ้น</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-bold mb-1.5">ความสำคัญ</label>
                                    <select id="taskPriority" class="w-full border border-gray-200 rounded-xl p-3 bg-white focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer">
                                        <option value="high" ${formData.priority === 'high' ? 'selected' : ''}>ด่วนมาก</option>
                                        <option value="medium" ${formData.priority === 'medium' ? 'selected' : ''}>ปานกลาง</option>
                                        <option value="low" ${formData.priority === 'low' ? 'selected' : ''}>ทั่วไป</option>
                                    </select>
                                </div>
                            </div>

                            <div class="pt-4 flex gap-3">
                                <button type="button" onclick="window.state.isModalOpen=false; window.render();" class="flex-1 px-4 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                                <button type="submit" class="flex-1 px-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold hover:opacity-90 shadow-md transition-all">บันทึกงาน</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        };

        const TaskDetailModal = () => {
            if (!state.viewingTask) return '';

            return `
                <div class="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl border border-white flex flex-col max-h-[90vh] animate-slide-in">
                        <div class="p-5 flex justify-between items-start bg-gradient-to-b from-indigo-50/50 to-white">
                            <div class="flex gap-2">
                                <span class="text-xs px-3 py-1 rounded-full font-bold border ${getStatusColor(state.viewingTask.status)}">${getStatusLabel(state.viewingTask.status)}</span>
                                <span class="text-xs px-3 py-1 rounded-full font-bold border ${getPriorityColor(state.viewingTask.priority)}">${getPriorityLabel(state.viewingTask.priority)}</span>
                            </div>
                            <button onclick="window.state.viewingTask=null; window.render();" class="text-gray-400 hover:text-gray-700 bg-gray-100 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 transition-colors">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>

                        <div class="px-6 pb-6 overflow-y-auto">
                            <h2 class="text-xl font-extrabold text-gray-800 mb-4 leading-tight">${state.viewingTask.title}</h2>

                            <div class="space-y-4">
                                <div>
                                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"><i class="fas fa-align-left mr-1"></i> รายละเอียด</h3>
                                    <div class="bg-gray-50 p-4 rounded-2xl text-gray-700 text-sm leading-relaxed whitespace-pre-wrap border border-gray-100 min-h-[60px]">
                                        ${state.viewingTask.description || '<span class="text-gray-400 italic">ไม่มีรายละเอียด</span>'}
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="bg-indigo-50/50 p-3 rounded-2xl border border-indigo-50">
                                        <span class="block text-[10px] font-bold text-indigo-400 uppercase mb-1">ผู้รับผิดชอบ</span>
                                        <div class="flex items-center gap-2 font-bold text-gray-800 text-sm">
                                            <div class="w-6 h-6 rounded-full bg-indigo-200 text-indigo-800 flex items-center justify-center text-[10px]">${state.viewingTask.assignee.substring(0,2)}</div>
                                            <span class="truncate">${state.viewingTask.assignee}</span>
                                        </div>
                                    </div>

                                    <div class="bg-red-50/50 p-3 rounded-2xl border border-red-50">
                                        <span class="block text-[10px] font-bold text-red-400 uppercase mb-1">กำหนดส่ง</span>
                                        <div class="font-bold text-gray-800 text-sm flex items-center gap-1.5">
                                            <i class="fas fa-calendar-alt text-red-400"></i> ${state.viewingTask.dueDate}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-5 border-t border-gray-100 bg-gray-50 flex gap-3 mt-auto">
                            <button onclick="if(confirm('ต้องการลบงานนี้ถาวร?')) window.handleDeleteTask('${state.viewingTask.id}');" class="px-4 py-3 bg-white border border-red-200 text-red-500 rounded-xl font-bold hover:bg-red-50 transition-colors flex items-center justify-center">
                                <i class="fas fa-trash"></i>
                            </button>
                            <button onclick="window.state.editingTask=window.state.viewingTask; window.state.viewingTask=null; window.state.isModalOpen=true; window.render();" class="flex-1 px-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold hover:opacity-90 shadow-md transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-edit"></i> แก้ไขงาน
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        // ======================== MAIN RENDER ========================
        window.render = function() {
            const appDiv = document.getElementById('app');

            if (state.isLoadingAuth) {
                appDiv.innerHTML = LoadingScreen();
                return;
            }

            if (!state.teamId) {
                appDiv.innerHTML = WorkspaceLoginScreen();
                return;
            }

            let content = '';
            if (state.currentView === 'dashboard') content = DashboardView();
            else if (state.currentView === 'board') content = BoardView();
            else if (state.currentView === 'members') content = MembersView();
            // ละ Calendar / Analytics ไว้เพื่อให้สั้นลงและโฟกัสฟังก์ชันหลัก สามารถเติมกลับได้ง่ายๆ

            appDiv.innerHTML = `
                <div class="min-h-screen bg-slate-50 font-sans text-gray-900 pb-20 md:pb-0 md:pl-64 flex flex-col">
                    ${Navigation()}
                    <main class="flex-1 overflow-y-auto">
                        ${content}
                    </main>
                    ${TaskModalForm()}
                    ${TaskDetailModal()}
                    ${ErrorToast()}
                </div>
            `;
        };

    </script>
</body>
</html>
