<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeamSync Pro - Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-nav { color: #4f46e5; font-weight: 700; background: rgba(79, 70, 229, 0.05); border-radius: 12px; }
        input, select, textarea { font-size: 16px !important; }
        .btn-primary { background: #4f46e5; color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Telegram Configuration ---
        const TG_CONFIG = {
            token: "8297881671:AAGcSq319AVyjvagyxBDV1STtdRV5WPILKs",
            chatId: "-1003907894437"
        };

        const firebaseConfig = {
            apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
            authDomain: "vitalvibe-c0306.firebaseapp.com",
            projectId: "vitalvibe-c0306",
            storageBucket: "vitalvibe-c0306.firebasestorage.app",
            messagingSenderId: "18887442289",
            appId: "1:18887442289:web:c179b03c6a818fa0ec80d0",
            measurementId: "G-S0JMBP3ERB"
        };

        const appId = "ts-prod-v16-telegram-full";
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Icons ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const paths = {
                dashboard: "M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 16h7v5H3v-5z",
                mytasks: "M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z",
                board: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z",
                calendar: "M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z",
                analytics: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2v-3h2v3zm4 0h-2v-5h2v5z",
                members: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
                plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
                logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
                layers: "M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z",
                edit: "M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
                x: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
                chevronRight: "M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z",
                bell: "M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><path d={paths[name] || ""} /></svg>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login'); 
            const [error, setError] = useState("");
            const [activeTeamId, setActiveTeamId] = useState(localStorage.getItem('ts_v16_active'));
            const [screen, setScreen] = useState('loading'); 
            const [view, setView] = useState('dashboard');
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isEditProfileOpen, setIsEditProfileOpen] = useState(false);
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const [notifTab, setNotifTab] = useState('personal'); 
            const [editingTask, setEditingTask] = useState(null);
            const [viewingTask, setViewingTask] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            const [selectedAssignees, setSelectedAssignees] = useState([]);

            // Telegram Notification Function
            const sendTelegramNotification = async (task, mode = "สร้าง") => {
                const message = `
<b>🚀 มีการ${mode}งานในทีม!</b>
━━━━━━━━━━━━━━━
📌 <b>งาน:</b> ${task.title}
👤 <b>ผู้รับผิดชอบ:</b> ${task.assignees.join(', ')}
📅 <b>กำหนดส่ง:</b> ${task.dueDate}
📊 <b>ความสำคัญ:</b> ${task.priority.toUpperCase()}
━━━━━━━━━━━━━━━
<i>ส่งจากระบบ TeamSync Pro</i>`;

                try {
                    await fetch(`https://api.telegram.org/bot${TG_CONFIG.token}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TG_CONFIG.chatId,
                            text: message,
                            parse_mode: 'HTML'
                        })
                    });
                } catch (e) { console.error("Telegram Error:", e); }
            };

            // 1. Auth Sync
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await db.collection('users_profile_v16').doc(u.uid).get();
                        if (doc.exists) {
                            setProfile(doc.data());
                            setScreen(activeTeamId ? 'workspace' : 'hub');
                        } else setScreen('setup');
                    } else setScreen('auth');
                    setLoading(false);
                });
                return () => unsub();
            }, [activeTeamId]);

            // 2. Data Sync
            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId || !user) return;
                const teamPath = `teams_v16/${activeTeamId}`;
                
                const unsubTasks = db.collection(`${teamPath}/tasks`).onSnapshot(s => {
                    setTasks(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubMembers = db.collection(`${teamPath}/members`).onSnapshot(s => {
                    setMembers(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                db.collection(`${teamPath}/members`).doc(user.uid).set({
                    name: profile?.name || "User",
                    email: user.email,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                return () => { unsubTasks(); unsubMembers(); };
            }, [activeTeamId, screen, user, profile?.name]);

            // Handlers
            const handleAuth = async (e) => {
                e.preventDefault();
                setError("");
                try {
                    if (authMode === 'login') await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value);
                    else await auth.createUserWithEmailAndPassword(e.target.email.value, e.target.password.value);
                } catch (err) { setError(err.message); }
            };

            const handleProfileSave = async (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                if (name && user) {
                    const data = { name, email: user.email, teams: profile?.teams || [] };
                    await db.collection('users_profile_v16').doc(user.uid).set(data, { merge: true });
                    setProfile(data);
                    setIsEditProfileOpen(false);
                    if (screen === 'setup') setScreen('hub');
                }
            };

            const joinTeam = async (e) => {
                e.preventDefault();
                const tid = e.target.teamId.value.trim().toUpperCase();
                if (tid && profile) {
                    const updated = [...new Set([...(profile.teams || []), tid])];
                    await db.collection('users_profile_v16').doc(user.uid).update({ teams: updated });
                    setProfile({ ...profile, teams: updated });
                    setActiveTeamId(tid);
                    localStorage.setItem('ts_v16_active', tid);
                    setScreen('workspace');
                    setView('dashboard');
                }
            };

            const saveTask = async (data) => {
                const path = `teams_v16/${activeTeamId}/tasks`;
                const taskData = { ...data, assignees: selectedAssignees.length > 0 ? selectedAssignees : [profile.name] };
                
                if (editingTask) {
                    await db.collection(path).doc(editingTask.id).update(taskData);
                    sendTelegramNotification(taskData, "อัปเดต");
                } else {
                    await db.collection(path).add({ ...taskData, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    sendTelegramNotification(taskData, "สร้าง");
                }
                
                setIsTaskModalOpen(false);
                setEditingTask(null);
            };

            // Calculations
            const stats = useMemo(() => {
                const t = tasks.length;
                const d = tasks.filter(x => x.status === 'done').length;
                const workload = members.map(m => ({
                    name: m.name,
                    count: tasks.filter(x => (x.assignees || []).includes(m.name) || (x.assignees || []).includes('ทุกคน')).length
                })).sort((a,b) => b.count - a.count);
                return { total: t, done: d, rate: t > 0 ? Math.round((d / t) * 100) : 0, workload };
            }, [tasks, members]);

            const myPersonalTasks = tasks.filter(t => (t.assignees || []).includes(profile?.name) && !(t.assignees || []).includes('ทุกคน'));
            const groupTasks = tasks.filter(t => (t.assignees || []).includes('ทุกคน'));
            const totalPending = tasks.filter(t => t.status !== 'done' && ((t.assignees || []).includes(profile?.name) || (t.assignees || []).includes('ทุกคน'))).length;

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-indigo-600 animate-pulse">เชื่อมต่อคลาวด์...</div>;

            if (screen === 'auth') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center animate-in">
                        <h1 className="text-2xl font-black mb-8">TeamSync Pro</h1>
                        {error && <p className="text-red-500 text-xs mb-4">{error}</p>}
                        <form onSubmit={handleAuth} className="space-y-3">
                            <input name="email" type="email" required placeholder="อีเมล" className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold" />
                            <input name="password" type="password" required placeholder="รหัสผ่าน" className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold" />
                            <button className="w-full p-4 btn-primary rounded-xl font-black shadow-lg">ยืนยัน</button>
                        </form>
                        <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="mt-6 text-xs font-bold text-indigo-600 uppercase underline">
                            {authMode === 'login' ? 'ยังไม่มีบัญชี? สมัครที่นี่' : 'มีบัญชีอยู่แล้ว? เข้าสู่ระบบ'}
                        </button>
                    </div>
                </div>
            );

            const ProfileEditor = ({ title, onClose }) => (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm">
                    <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-sm text-center animate-in relative">
                        {onClose && <button onClick={onClose} className="absolute top-6 right-6 text-slate-300"><Icon name="x" size={24}/></button>}
                        <h1 className="text-2xl font-black mb-6 text-indigo-600">{title}</h1>
                        <form onSubmit={handleProfileSave} className="space-y-4">
                            <input name="username" required defaultValue={profile?.name} placeholder="ระบุชื่อของคุณ" className="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold text-lg focus:ring-4 focus:ring-indigo-100 outline-none transition-all" />
                            <button className="w-full p-4 btn-primary rounded-2xl font-black shadow-xl">บันทึกข้อมูล</button>
                        </form>
                    </div>
                </div>
            );

            if (screen === 'setup') return <ProfileEditor title="ตั้งค่าโปรไฟล์" />;

            if (screen === 'hub') return (
                <div className="min-h-screen p-5 bg-slate-50 animate-in max-w-md mx-auto">
                    {isEditProfileOpen && <ProfileEditor title="แก้ไขโปรไฟล์" onClose={() => setIsEditProfileOpen(false)} />}
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg uppercase">{profile?.name.substring(0,2)}</div>
                            <div>
                                <h1 className="text-xl font-black leading-none flex items-center gap-2">สวัสดี, {profile?.name} <button onClick={() => setIsEditProfileOpen(true)} className="text-indigo-400 active:scale-90"><Icon name="edit" size={14}/></button></h1>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Multi-Team Hub</p>
                            </div>
                        </div>
                        <button onClick={() => auth.signOut()} className="p-2 text-red-500 bg-white rounded-xl shadow-sm border border-red-50 active:scale-90"><Icon name="logout" size={18}/></button>
                    </header>
                    <div className="bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-100 mb-8 text-center">
                        <h2 className="text-sm font-black mb-4 flex items-center justify-center gap-2 text-indigo-600"><Icon name="plus" size={16}/> สร้างหรือเข้าร่วมทีมใหม่</h2>
                        <form onSubmit={joinTeam} className="flex gap-2">
                            <input name="teamId" required placeholder="TEAM-ID" className="flex-1 p-3.5 bg-slate-50 border-none rounded-xl font-bold uppercase outline-none focus:ring-2 focus:ring-indigo-50" />
                            <button className="px-5 btn-primary rounded-xl font-black text-xs shadow-lg">GO</button>
                        </form>
                    </div>
                    <div className="space-y-3">
                        <h2 className="text-[10px] font-black px-4 text-slate-400 uppercase tracking-widest">ทีมของคุณ ({profile?.teams?.length || 0})</h2>
                        {profile?.teams?.map(tid => (
                            <div key={tid} onClick={() => { setActiveTeamId(tid); localStorage.setItem('ts_v16_active', tid); setScreen('workspace'); }} className="bg-white p-5 rounded-2xl shadow-sm border border-transparent hover:border-indigo-100 active:scale-95 transition-all flex justify-between items-center group cursor-pointer">
                                <div className="flex items-center gap-4"><div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center font-black group-hover:bg-indigo-600 group-hover:text-white transition-all">#</div><p className="font-black text-lg">{tid}</p></div>
                                <Icon name="chevronRight" className="text-slate-200" />
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 md:pl-64 md:pb-0 animate-in">
                    {isEditProfileOpen && <ProfileEditor title="แก้ไขโปรไฟล์" onClose={() => setIsEditProfileOpen(false)} />}
                    <aside className="hidden md:flex flex-col fixed inset-y-0 left-0 w-64 bg-white border-r p-8 z-30">
                        <div className="flex items-center gap-2 mb-10"><div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black">T</div><span className="font-black text-xl tracking-tight">TeamSync</span></div>
                        <nav className="flex-1 space-y-1">
                            {['dashboard', 'mytasks', 'board', 'calendar', 'analytics', 'members'].map(m => (
                                <button key={m} onClick={() => setView(m)} className={`flex items-center gap-3 w-full p-3.5 rounded-xl text-sm font-bold transition-all ${view === m ? 'active-nav bg-indigo-50 shadow-sm text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={m} size={18}/> {m.charAt(0).toUpperCase() + m.slice(1)}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setScreen('hub')} className="mt-auto p-4 bg-slate-900 rounded-xl text-white text-[10px] font-black uppercase text-center tracking-[0.2em] shadow-lg active:scale-95 transition-all">สลับทีมงาน</button>
                    </aside>

                    <nav className="md:hidden fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-2 pb-safe z-40 shadow-xl">
                        {['dashboard', 'mytasks', 'board', 'members'].map(m => (
                            <button key={m} onClick={() => setView(m)} className={`flex flex-col items-center p-2 flex-1 rounded-xl transition-all ${view === m ? 'active-nav bg-indigo-50/50' : 'text-slate-300'}`}>
                                <Icon name={m} size={22}/>
                            </button>
                        ))}
                        <button onClick={() => setScreen('hub')} className="flex flex-col items-center p-2 flex-1 text-slate-300"><Icon name="layers" size={22}/></button>
                    </nav>

                    <main className="p-4 md:p-12 max-w-4xl mx-auto space-y-6">
                        <header className="flex justify-between items-start mb-2">
                            <div>
                                <h2 className="text-2xl font-black leading-none flex items-center gap-3">คุณ{profile?.name} <button onClick={() => setIsEditProfileOpen(true)} className="text-indigo-400 active:scale-90"><Icon name="edit" size={14}/></button></h2>
                                <p className="text-indigo-500 font-bold text-[10px] uppercase tracking-widest mt-2">Active: #{activeTeamId} ({view})</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsNotifOpen(true)} className="relative w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center active:scale-90 transition-all border border-slate-100">
                                    <Icon name="bell" size={20} className="text-slate-600"/>
                                    {totalPending > 0 && <span className="absolute top-2 right-3 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>}
                                </button>
                                <button onClick={() => { setEditingTask(null); setSelectedAssignees([profile.name]); setIsTaskModalOpen(true); }} className="w-12 h-12 btn-primary rounded-2xl shadow-xl flex items-center justify-center active:scale-90 transition-all"><Icon name="plus" size={24}/></button>
                            </div>
                        </header>

                        {/* Views */}
                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-indigo-600 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase mb-1">ทั้งหมด</p><p className="text-3xl font-black leading-none">{tasks.length}</p></div>
                                    <div className="bg-emerald-500 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase mb-1">เสร็จสิ้น</p><p className="text-3xl font-black leading-none">{stats.done}</p></div>
                                </div>
                                <div className="bg-white p-7 rounded-[2.5rem] border flex items-center justify-between shadow-sm">
                                    <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Team Success</p><p className="text-5xl font-black text-indigo-600 mt-2 tracking-tighter">{stats.rate}%</p></div>
                                    <div className="w-24 h-12 bg-indigo-50 rounded-xl relative overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-1000" style={{width: `${stats.rate}%`}}></div></div>
                                </div>
                                <div className="bg-white p-7 rounded-[2.5rem] border shadow-sm">
                                    <h3 className="font-black text-sm mb-4 uppercase tracking-widest text-slate-300 italic">Latest Tasks</h3>
                                    <div className="space-y-3">
                                        {tasks.slice(-3).reverse().map(t => (
                                            <div key={t.id} onClick={() => setViewingTask(t)} className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-indigo-50 transition-all">
                                                <p className="font-bold text-sm">{t.title}</p>
                                                <div className={`w-1.5 h-8 rounded-full ${t.status === 'done' ? 'bg-emerald-400' : 'bg-indigo-400'}`}></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'mytasks' && (
                            <div className="bg-white p-7 rounded-[2.5rem] border shadow-sm animate-in">
                                <h3 className="text-xl font-black mb-1">งานของฉัน</h3>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-6 italic">Personal Tasks</p>
                                <div className="space-y-3 mb-10">
                                    {myPersonalTasks.length === 0 ? <p className="text-center py-6 text-slate-300 font-bold">ไม่มีงานส่วนตัว</p> : myPersonalTasks.map(t => (
                                        <div key={t.id} onClick={() => setViewingTask(t)} className="bg-slate-50 p-5 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-indigo-50 transition-all border border-transparent">
                                            <div><h4 className={`font-bold text-sm ${t.status === 'done' ? 'line-through text-slate-400' : ''}`}>{t.title}</h4></div>
                                            <Icon name="chevronRight" className="text-slate-200" />
                                        </div>
                                    ))}
                                </div>
                                <h3 className="text-xl font-black mb-1 pt-6 border-t">งานกลุ่ม</h3>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-6 italic">Group Tasks</p>
                                <div className="space-y-3">
                                    {groupTasks.length === 0 ? <p className="text-center py-6 text-slate-300 font-bold">ไม่มีงานกลุ่ม</p> : groupTasks.map(t => (
                                        <div key={t.id} onClick={() => setViewingTask(t)} className="bg-amber-50/50 p-5 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-amber-100 transition-all border border-transparent">
                                            <div><h4 className={`font-bold text-sm ${t.status === 'done' ? 'line-through text-slate-400' : ''}`}>{t.title}</h4></div>
                                            <Icon name="chevronRight" className="text-slate-200" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'board' && (
                            <div className="flex gap-4 overflow-x-auto pb-10 no-scrollbar min-h-[500px]">
                                {['todo', 'in-progress', 'done'].map(st => (
                                    <div key={st} className="min-w-[280px] flex flex-col bg-slate-100/50 rounded-[2.5rem] p-4 border border-slate-100">
                                        <div className="flex justify-between items-center mb-5 px-3">
                                            <span className="font-black text-slate-400 text-[10px] uppercase tracking-[0.2em]">{st}</span>
                                            <span className="bg-white px-2 py-0.5 rounded-lg text-[10px] font-black">{tasks.filter(t => t.status === st).length}</span>
                                        </div>
                                        <div className="space-y-3">
                                            {tasks.filter(t => t.status === st).map(task => (
                                                <div key={task.id} onClick={() => setViewingTask(task)} className="bg-white p-5 rounded-2xl shadow-sm border border-white active:scale-95 transition-all cursor-pointer">
                                                    <div className={`text-[8px] font-black px-2 py-0.5 rounded mb-3 inline-block border ${task.priority === 'high' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-slate-50 text-slate-400'}`}>{task.priority.toUpperCase()}</div>
                                                    <h4 className="font-bold text-sm leading-snug line-clamp-2 text-slate-800">{task.title}</h4>
                                                    <div className="mt-4 flex justify-between items-center pt-3 border-t border-slate-50">
                                                        <span className="text-[9px] font-bold text-slate-400 truncate max-w-[120px]">{(task.assignees || []).join(', ')}</span>
                                                        <span className="text-[9px] font-black text-slate-200">{task.dueDate}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'calendar' && (
                            <div className="bg-white p-5 rounded-[2.5rem] border shadow-sm animate-in">
                                <div className="flex justify-between items-center mb-6 px-2">
                                    <h3 className="text-lg font-black">{calDate.toLocaleString('th-TH', { month: 'long', year: 'numeric' })}</h3>
                                    <div className="flex gap-1">
                                        <button onClick={() => setCalDate(new Date(calDate.getFullYear(), calDate.getMonth() - 1, 1))} className="p-2 bg-slate-50 rounded-xl text-[10px] font-bold">ก่อนหน้า</button>
                                        <button onClick={() => setCalDate(new Date(calDate.getFullYear(), calDate.getMonth() + 1, 1))} className="p-2 bg-slate-50 rounded-xl text-[10px] font-bold">ถัดไป</button>
                                    </div>
                                </div>
                                <div className="calendar-grid">
                                    {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => (<div key={d} className="text-center font-black text-slate-300 text-[9px] py-2 uppercase tracking-widest">{d}</div>))}
                                    {Array.from({ length: new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay() }).map((_, i) => <div key={`e-${i}`} className="h-12" />)}
                                    {Array.from({ length: new Date(calDate.getFullYear(), calDate.getMonth() + 1, 0).getDate() }).map((_, i) => {
                                        const d = i + 1;
                                        const dateStr = `${calDate.getFullYear()}-${(calDate.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                                        const dayTasks = tasks.filter(x => x.dueDate === dateStr);
                                        const isToday = new Date().toISOString().split('T')[0] === dateStr;
                                        return (
                                            <div key={d} onClick={() => dayTasks.length > 0 && setViewingTask(dayTasks[0])} className={`h-12 md:h-16 rounded-xl flex flex-col items-center justify-center transition-all ${isToday ? 'bg-indigo-600 text-white font-black shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-500 active:bg-indigo-50 cursor-pointer'}`}>
                                                <span className="text-xs">{d}</span>
                                                <div className="flex gap-0.5 mt-0.5">{dayTasks.slice(0, 3).map(tk => (<div key={tk.id} className={`w-1 h-1 rounded-full ${isToday ? 'bg-white' : 'bg-indigo-400'}`}></div>))}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'analytics' && (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] border shadow-sm text-center flex flex-col items-center">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-10 italic">Success Rate Chart</h3>
                                    <div className="relative w-48 h-48 flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90"><circle cx="96" cy="96" r="86" stroke="currentColor" strokeWidth="16" fill="transparent" className="text-slate-50"/><circle cx="96" cy="96" r="86" stroke="currentColor" strokeWidth="16" fill="transparent" strokeDasharray="540" strokeDashoffset={540 - (540 * stats.rate) / 100} className="text-indigo-600 transition-all duration-1000" strokeLinecap="round"/></svg>
                                        <span className="absolute text-6xl font-black text-slate-800 tracking-tighter">{stats.rate}%</span>
                                    </div>
                                </div>
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
                                    <h3 className="text-sm font-black mb-8 tracking-tight text-indigo-400 uppercase">Members Workload</h3>
                                    <div className="space-y-8">
                                        {stats.workload.map(w => (
                                            <div key={w.name}>
                                                <div className="flex justify-between items-end mb-3 text-[10px] font-bold uppercase tracking-widest"><span>{w.name}</span><span>{w.count} งาน</span></div>
                                                <div className="h-1.5 w-full bg-white/10 rounded-full overflow-hidden flex"><div className="h-full bg-indigo-400 transition-all duration-1000" style={{ width: `${(w.count / (stats.total || 1)) * 100}%` }}></div></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'members' && (
                            <div className="space-y-4">
                                <div className="px-4"><h3 className="text-xl font-black text-slate-800 leading-none tracking-tight">Active Team</h3><p className="text-slate-400 text-xs font-bold mt-2 uppercase tracking-widest">ทีมงานปัจจุบัน ({members.length})</p></div>
                                {members.map(m => (
                                    <div key={m.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-50 flex justify-between items-center animate-in">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-indigo-50 text-indigo-700 rounded-xl flex items-center justify-center font-black text-lg uppercase shadow-inner border border-white">{m.name.substring(0,2)}</div>
                                            <div>
                                                <h4 className="font-black text-sm text-slate-800 leading-none">{m.name}</h4>
                                                <p className="text-[10px] font-bold text-slate-300 mt-2 uppercase tracking-widest">{m.id === user.uid ? 'คุณ (ออนไลน์)' : 'สมาชิก'}</p>
                                            </div>
                                        </div>
                                        <button onClick={async () => {
                                            if (window.confirm("ยืนยันการลบสมาชิก?")) {
                                                await db.collection(`teams_v16/${activeTeamId}/members`).doc(m.id).delete();
                                            }
                                        }} className="p-2 text-slate-300 hover:text-red-500 active:scale-90 transition-all"><Icon name="trash" size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Notification Drawer */}
                    {isNotifOpen && (
                        <div className="fixed inset-0 z-[150] flex items-start justify-center p-4 bg-slate-900/60 backdrop-blur-sm pt-20 md:pt-24">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-6 relative animate-in max-h-[80vh] flex flex-col">
                                <button onClick={() => setIsNotifOpen(false)} className="absolute top-6 right-6 p-2 text-slate-300 hover:text-slate-500 active:scale-90"><Icon name="x" size={20}/></button>
                                <h3 className="font-black text-lg mb-4 flex items-center gap-2 text-slate-800 shrink-0"><Icon name="bell" size={20} className="text-indigo-500"/> แจ้งเตือนงาน</h3>
                                <div className="flex gap-2 mb-4 shrink-0 bg-slate-50 p-1.5 rounded-2xl">
                                    <button onClick={() => setNotifTab('personal')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${notifTab === 'personal' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>ส่วนบุคคล</button>
                                    <button onClick={() => setNotifTab('group')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${notifTab === 'group' ? 'bg-white text-amber-500 shadow-sm' : 'text-slate-400'}`}>งานกลุ่ม</button>
                                </div>
                                <div className="overflow-y-auto no-scrollbar space-y-2 pb-2">
                                    {(notifTab === 'personal' ? myPersonalTasks : groupTasks).filter(t => t.status !== 'done').map(t => (
                                        <div key={t.id} onClick={() => { setIsNotifOpen(false); setViewingTask(t); }} className="p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 active:scale-95 transition-all border border-transparent hover:border-indigo-100">
                                            <p className="font-bold text-sm text-slate-800">{t.title}</p>
                                            <div className="text-[9px] font-black uppercase tracking-widest mt-2 text-slate-400">กำหนดส่ง: {t.dueDate}</div>
                                        </div>
                                    ))}
                                    {(notifTab === 'personal' ? myPersonalTasks : groupTasks).filter(t => t.status !== 'done').length === 0 && <p className="text-center py-10 text-slate-300 font-bold">ไม่มีงานค้าง</p>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Task Modal */}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden animate-in flex flex-col max-h-screen">
                                <div className="p-6 md:p-8 border-b flex justify-between items-center bg-slate-50/50 shrink-0">
                                    <h3 className="text-lg font-black text-slate-800">{editingTask ? '📝 แก้ไขงาน' : '✨ สร้างงานใหม่'}</h3>
                                    <button onClick={() => setIsTaskModalOpen(false)} className="p-2 hover:bg-white rounded-full text-slate-400 shadow-sm active:scale-90"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="overflow-y-auto no-scrollbar pb-10">
                                    <form className="p-6 md:p-8 space-y-5" onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        saveTask(Object.fromEntries(fd));
                                    }}>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">ชื่องาน</label>
                                            <input required name="title" defaultValue={editingTask?.title} placeholder="งานที่ต้องทำ..." className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm focus:ring-4 focus:ring-indigo-100 outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">รายละเอียดงาน</label>
                                            <textarea name="description" defaultValue={editingTask?.description} placeholder="รายละเอียด..." className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm h-24 outline-none focus:ring-4 focus:ring-indigo-100"></textarea>
                                        </div>
                                        <div className="space-y-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">ผู้รับผิดชอบ</label>
                                            <div className="flex flex-wrap gap-2 pt-1">
                                                <button type="button" onClick={() => setSelectedAssignees(['ทุกคน'])} className={`px-3 py-2 rounded-xl text-xs font-bold transition-all border ${selectedAssignees.includes('ทุกคน') ? 'bg-amber-100 text-amber-600 border-amber-200 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-100'}`}>✓ ทุกคน</button>
                                                {members.map(m => (
                                                    <button key={m.id} type="button" onClick={() => {
                                                        if (selectedAssignees.includes('ทุกคน')) setSelectedAssignees([m.name]);
                                                        else setSelectedAssignees(prev => prev.includes(m.name) ? prev.filter(a => a !== m.name) : [...prev, m.name]);
                                                    }} className={`px-3 py-2 rounded-xl text-xs font-bold transition-all border ${selectedAssignees.includes(m.name) && !selectedAssignees.includes('ทุกคน') ? 'bg-indigo-100 text-indigo-600 border-indigo-200 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-100'}`}>{selectedAssignees.includes(m.name) && !selectedAssignees.includes('ทุกคน') ? '✓ ' : ''}{m.name}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">กำหนดส่ง</label>
                                                <input name="dueDate" type="date" defaultValue={editingTask?.dueDate || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">ความสำคัญ</label>
                                                <select name="priority" defaultValue={editingTask?.priority || 'medium'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none">
                                                    <option value="low">Low</option>
                                                    <option value="medium">Medium</option>
                                                    <option value="high">High</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">สถานะ</label>
                                            <select name="status" defaultValue={editingTask?.status || 'todo'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none">
                                                <option value="todo">To Do</option>
                                                <option value="in-progress">Doing</option>
                                                <option value="done">Done</option>
                                            </select>
                                        </div>
                                        <button disabled={selectedAssignees.length === 0} className={`w-full p-5 rounded-[2rem] font-black shadow-xl active:scale-95 transition-all mt-6 uppercase text-xs tracking-widest ${selectedAssignees.length === 0 ? 'bg-slate-200 text-slate-400' : 'btn-primary shadow-indigo-200'}`}>บันทึกข้อมูล</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Task View Modal */}
                    {viewingTask && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] md:rounded-[3rem] shadow-2xl p-10 relative animate-in max-h-screen overflow-y-auto no-scrollbar">
                                <button onClick={() => setViewingTask(null)} className="absolute top-10 right-10 p-3 text-slate-300 active:scale-90"><Icon name="x" size={24}/></button>
                                <div className={`px-4 py-1 rounded-lg text-[9px] font-black uppercase mb-6 inline-block border ${viewingTask.priority === 'high' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-slate-50 text-slate-400'}`}>{viewingTask.priority} PRIORITY</div>
                                <h3 className="text-3xl font-black text-slate-800 mb-6 leading-tight tracking-tight">{viewingTask.title}</h3>
                                <div className="space-y-4 mb-10 text-left">
                                    <div className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div className="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-black text-lg uppercase shadow-lg shrink-0">{(viewingTask.assignees || [])[0]?.substring(0,2)}</div>
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Assignees</p>
                                            <p className="font-bold text-slate-800 text-sm leading-snug mt-2">{(viewingTask.assignees || []).join(', ')}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100"><div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-indigo-600 shadow-sm shrink-0"><Icon name="calendar" size={24}/></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Due Date</p><p className="font-bold text-slate-800 text-lg leading-none mt-2">{viewingTask.dueDate}</p></div></div>
                                </div>
                                <div className="flex gap-3 mt-auto pt-2">
                                    <button onClick={async () => {
                                        if (window.confirm("ยืนยันการลบงาน?")) {
                                            await db.collection(`teams_v16/${activeTeamId}/tasks`).doc(viewingTask.id).delete();
                                            setViewingTask(null);
                                        }
                                    }} className="p-5 bg-red-50 text-red-500 rounded-2xl active:scale-95 transition-all shadow-inner border border-red-100" title="ลบงาน"><Icon name="trash" size={24}/></button>
                                    <button onClick={() => { setEditingTask(viewingTask); setSelectedAssignees(viewingTask.assignees || []); setViewingTask(null); setIsTaskModalOpen(true); }} className="flex-1 p-5 bg-slate-900 text-white rounded-[2.2rem] font-black shadow-2xl active:scale-95 transition-all uppercase text-xs tracking-widest">แก้ไขข้อมูล</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
